id = "audio_importer"
version = "0.1.0"
sdk_api_version = "0.1.0"
display_name = "Audio Importer"
category = "asset_importer"
description = "Runtime audio importer package."
supported_targets = ["client_runtime", "editor_host"]
supported_platforms = ["windows", "linux", "macos"]
capabilities = [
    "runtime.plugin.audio_importer",
    "runtime.asset.importer.audio.wav",
]
asset_roots = []
content_roots = []
default_packaging = ["source_template", "library_embed"]

[[asset_importers]]
id = "audio_importer.wav"
plugin_id = "audio_importer"
priority = 120
source_extensions = ["wav"]
output_kind = "Sound"
importer_version = 1
required_capabilities = ["runtime.asset.importer.audio.wav"]

[[asset_importers]]
id = "audio_importer.optional_codec"
plugin_id = "audio_importer"
priority = 90
source_extensions = ["mp3", "ogg", "flac", "aif", "aiff", "opus"]
output_kind = "Sound"
importer_version = 1
required_capabilities = ["runtime.asset.importer.native"]

[[modules]]
name = "audio_importer.runtime"
kind = "runtime"
crate_name = "zircon_plugin_audio_importer_runtime"
target_modes = ["client_runtime", "editor_host"]
capabilities = [
    "runtime.plugin.audio_importer",
    "runtime.asset.importer.audio.wav",
]
