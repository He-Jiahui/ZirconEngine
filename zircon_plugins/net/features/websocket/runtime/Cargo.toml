[package]
name = "zircon_plugin_net_websocket_runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "WebSocket runtime feature package for Zircon networking."

[dependencies]
futures-util = { version = "0.3", features = ["sink"] }
tokio = { version = "1", features = ["net", "rt", "time"] }
tokio-tungstenite = { version = "0.28", default-features = false, features = ["connect", "rustls-tls-webpki-roots"] }
zircon_plugin_net_runtime = { path = "../../../runtime" }
zircon_runtime = { path = "../../../../../zircon_runtime", default-features = false }
