id = "net"
version = "0.1.0"
sdk_api_version = "0.1.0"
display_name = "Network"
category = "runtime"
description = "Optional networking runtime and editor diagnostics package."
maturity = "beta"
supported_targets = ["server_runtime", "client_runtime", "editor_host"]
capabilities = ["runtime.plugin.net"]
default_packaging = ["source_template", "library_embed"]

[[capability_statuses]]
capability = "runtime.plugin.net"
status = "partial"
bevy_references = ["dev/bevy/crates/bevy_remote/src/lib.rs"]

[[event_catalogs]]
namespace = "net.runtime_events"
version = 1
events = [
    { id = "net.runtime_events.listener_started", display_name = "Listener Started", payload_schema = "net.runtime.listener_started.v1" },
    { id = "net.runtime_events.connection_state_changed", display_name = "Connection State Changed", payload_schema = "net.runtime.connection_state_changed.v1" },
    { id = "net.runtime_events.http_route_registered", display_name = "HTTP Route Registered", payload_schema = "net.runtime.http_route_registered.v1" },
    { id = "net.runtime_events.websocket_frame_queued", display_name = "WebSocket Frame Queued", payload_schema = "net.runtime.websocket_frame_queued.v1" },
]

[[modules]]
name = "net.runtime"
kind = "runtime"
crate_name = "zircon_plugin_net_runtime"
target_modes = ["server_runtime", "client_runtime", "editor_host"]
capabilities = ["runtime.plugin.net"]

[[modules]]
name = "net.editor"
kind = "editor"
crate_name = "zircon_plugin_net_editor"
target_modes = ["editor_host"]
capabilities = ["editor.extension.net_authoring"]

[[optional_features]]
id = "net.http"
display_name = "HTTP(S)"
owner_plugin_id = "net"
capabilities = ["runtime.feature.net.http"]
default_packaging = ["source_template", "library_embed"]
enabled_by_default = false

[[optional_features.dependencies]]
plugin_id = "net"
capability = "runtime.plugin.net"
primary = true

[[optional_features.modules]]
name = "net.http.runtime"
kind = "runtime"
crate_name = "zircon_plugin_net_http_runtime"
target_modes = ["server_runtime", "client_runtime"]
capabilities = ["runtime.feature.net.http"]

[[optional_features]]
id = "net.websocket"
