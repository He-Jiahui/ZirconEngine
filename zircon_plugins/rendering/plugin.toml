id = "rendering"
version = "0.1.0"
display_name = "Rendering"
category = "rendering"
description = "Optional rendering feature owner package for post process, SSAO, decals, probes, baked lighting, ray tracing policy, shader graph, and VFX graph."
default_packaging = ["source_template", "library_embed"]

[[modules]]
name = "rendering.runtime"
kind = "runtime"
crate_name = "zircon_plugin_rendering_runtime"
target_modes = ["client_runtime", "editor_host"]
capabilities = ["runtime.plugin.rendering"]

[[modules]]
name = "rendering.editor"
kind = "editor"
crate_name = "zircon_plugin_rendering_editor"
target_modes = ["editor_host"]
capabilities = ["editor.extension.rendering_authoring"]

