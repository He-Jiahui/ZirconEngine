stylesheets = []

[asset]
kind = "layout"
id = "navigation.bake"
version = 1
display_name = "Navigation Bake"

[imports]
styles = ["res://ui/theme/editor_base.ui.toml"]

[root]
node_id = "navigation_bake_root"
kind = "native"
type = "VerticalBox"
control_id = "NavigationBakeRoot"
classes = ["editor-shell"]

[root.layout.container]
kind = "VerticalBox"
gap = 6.0

[root.layout.width]
stretch = "Stretch"

[root.layout.height]
stretch = "Stretch"

[[root.children]]
[root.children.node]
node_id = "navigation_bake_toolbar"
kind = "native"
type = "Space"
control_id = "NavigationBakeToolbar"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
min = 40.0
preferred = 40.0
stretch = "Fixed"

[[root.children]]
[root.children.node]
node_id = "navigation_bake_diagnostics"
kind = "native"
type = "Space"
control_id = "NavigationBakeDiagnostics"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
stretch = "Stretch"

[components]
