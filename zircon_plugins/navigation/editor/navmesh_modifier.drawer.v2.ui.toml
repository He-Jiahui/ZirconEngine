[asset]
kind = "view"
id = "navigation.navmesh_modifier.drawer"
version = 2
display_name = "NavMeshModifier"

[imports]
styles = ["res://ui/theme/editor_base.v2.ui.toml"]

[root]
node = "navigation_navmesh_modifier_drawer_root"

[nodes.navigation_navmesh_modifier_fields]
component = "Space"
control_id = "NavigationNavMeshModifierFields"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.navigation_navmesh_modifier_drawer_root]
component = "VerticalGroup"
control_id = "NavigationNavMeshModifierDrawerRoot"
classes = ["editor-shell"]
layout = { container = { kind = "VerticalBox", gap = 4.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ node = "navigation_navmesh_modifier_fields" }]
