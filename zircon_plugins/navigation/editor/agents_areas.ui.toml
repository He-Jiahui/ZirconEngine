stylesheets = []

[asset]
kind = "layout"
id = "navigation.agents_areas"
version = 1
display_name = "Navigation Agents And Areas"

[imports]
styles = ["res://ui/theme/editor_base.ui.toml"]

[root]
node_id = "navigation_agents_areas_root"
kind = "native"
type = "VerticalBox"
control_id = "NavigationAgentsAreasRoot"
classes = ["editor-shell"]

[root.layout.container]
kind = "VerticalBox"
gap = 6.0

[root.layout.width]
stretch = "Stretch"

[root.layout.height]
stretch = "Stretch"

[[root.children]]
[root.children.node]
node_id = "navigation_agent_settings"
kind = "native"
type = "Space"
control_id = "NavigationAgentSettings"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
min = 96.0
preferred = 120.0
stretch = "Fixed"

[[root.children]]
[root.children.node]
node_id = "navigation_area_settings"
kind = "native"
type = "Space"
control_id = "NavigationAreaSettings"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
stretch = "Stretch"

[components]
