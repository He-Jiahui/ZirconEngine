[asset]
kind = "view"
id = "navigation.navmesh_surface.drawer"
version = 2
display_name = "NavMeshSurface"

[imports]
styles = ["res://ui/theme/editor_base.v2.ui.toml"]

[root]
node = "navigation_navmesh_surface_drawer_root"

[nodes.navigation_navmesh_surface_fields]
component = "Space"
control_id = "NavigationNavMeshSurfaceFields"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.navigation_navmesh_surface_drawer_root]
component = "VerticalGroup"
control_id = "NavigationNavMeshSurfaceDrawerRoot"
classes = ["editor-shell"]
layout = { container = { kind = "VerticalBox", gap = 4.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ node = "navigation_navmesh_surface_fields" }]
