stylesheets = []

[asset]
kind = "layout"
id = "navigation.navmesh_offmesh_link.drawer"
version = 1
display_name = "NavMeshOffMeshLink"

[imports]
styles = ["res://ui/theme/editor_base.ui.toml"]

[root]
node_id = "navigation_navmesh_offmesh_link_drawer_root"
