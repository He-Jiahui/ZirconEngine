[asset]
kind = "view"
id = "navigation.debug_gizmos"
version = 2
display_name = "Navigation Debug Gizmos"

[imports]
styles = ["res://ui/theme/editor_base.v2.ui.toml"]

[root]
node = "navigation_debug_root"

[nodes.navigation_debug_layers]
component = "Space"
control_id = "NavigationDebugLayers"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.navigation_debug_root]
component = "VerticalGroup"
control_id = "NavigationDebugRoot"
classes = ["editor-shell"]
layout = { container = { kind = "VerticalBox", gap = 6.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ node = "navigation_debug_layers" }]
