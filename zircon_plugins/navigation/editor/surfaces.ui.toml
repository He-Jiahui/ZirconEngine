stylesheets = []

[asset]
kind = "layout"
id = "navigation.surfaces"
version = 1
display_name = "Navigation Surfaces"

[imports]
styles = ["res://ui/theme/editor_base.ui.toml"]

[root]
node_id = "navigation_surfaces_root"
kind = "native"
type = "VerticalBox"
control_id = "NavigationSurfacesRoot"
classes = ["editor-shell"]

[root.layout.container]
kind = "VerticalBox"
gap = 6.0

[root.layout.width]
stretch = "Stretch"

[root.layout.height]
stretch = "Stretch"

[[root.children]]
[root.children.node]
node_id = "navigation_surfaces_list"
kind = "native"
type = "Space"
control_id = "NavigationSurfacesList"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
stretch = "Stretch"

[components]
