id = "navigation"
version = "0.1.0"
sdk_api_version = "0.1.0"
package_prefix = "com"
package_company = "zircon"
package_name = "navigation"
display_name = "Navigation"
category = "runtime"
description = "Optional navigation runtime and editor package."
maturity = "beta"
supported_targets = ["client_runtime", "server_runtime", "editor_host"]
capabilities = ["runtime.plugin.navigation"]
default_packaging = ["source_template", "library_embed"]

[[capability_statuses]]
capability = "runtime.plugin.navigation"
status = "partial"
note = "Gameplay navmesh/pathfinding is optional; UI navigation parity is separate."

[[modules]]
name = "navigation.runtime"
kind = "runtime"
crate_name = "zircon_plugin_navigation_runtime"
target_modes = ["client_runtime", "server_runtime", "editor_host"]
capabilities = ["runtime.plugin.navigation"]

[[modules]]
name = "navigation.editor"
kind = "editor"
crate_name = "zircon_plugin_navigation_editor"
target_modes = ["editor_host"]
capabilities = ["editor.extension.navigation_authoring"]
