id = "physics"
version = "0.1.0"
display_name = "Physics"
description = "Optional runtime physics and editor authoring package."
default_packaging = ["source_template", "library_embed"]

[[modules]]
name = "physics.runtime"
kind = "runtime"
crate_name = "zircon_plugin_physics_runtime"
target_modes = ["client_runtime", "server_runtime", "editor_host"]
capabilities = ["runtime.plugin.physics"]

[[modules]]
name = "physics.editor"
kind = "editor"
crate_name = "zircon_plugin_physics_editor"
target_modes = ["editor_host"]
capabilities = ["editor.extension.physics_authoring"]
