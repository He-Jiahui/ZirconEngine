stylesheets = []

[asset]
kind = "layout"
id = "particles.preview"
version = 1
display_name = "Particle Preview"

[imports]
styles = ["res://ui/theme/editor_base.ui.toml"]

[root]
node_id = "particles_preview_root"
kind = "native"
type = "VerticalBox"
control_id = "ParticlesPreviewRoot"
classes = ["editor-shell"]

[root.layout.container]
kind = "VerticalBox"
gap = 6.0

[root.layout.width]
stretch = "Stretch"

[root.layout.height]
stretch = "Stretch"

[[root.children]]
[root.children.node]
node_id = "particles_preview_viewport"
kind = "native"
type = "Space"
control_id = "ParticlesPreviewViewport"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
stretch = "Stretch"

[[root.children]]
[root.children.node]
node_id = "particles_preview_transport"
kind = "native"
type = "Space"
control_id = "ParticlesPreviewTransport"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
min = 36.0
preferred = 36.0
max = 36.0
stretch = "Fixed"

[[root.children]]
[root.children.node]
node_id = "particles_preview_stats"
kind = "native"
type = "Space"
control_id = "ParticlesPreviewStats"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
min = 64.0
preferred = 64.0
max = 64.0
stretch = "Fixed"

[components]
