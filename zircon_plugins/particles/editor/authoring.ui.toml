stylesheets = []

[asset]
kind = "layout"
id = "particles.authoring"
version = 1
display_name = "Particles Authoring"

[imports]
styles = ["res://ui/theme/editor_base.ui.toml"]

[root]
node_id = "particles_authoring_root"
kind = "native"
type = "VerticalBox"
control_id = "ParticlesAuthoringRoot"
classes = ["editor-shell"]

[root.layout.container]
kind = "VerticalBox"
gap = 6.0

[root.layout.width]
stretch = "Stretch"

[root.layout.height]
stretch = "Stretch"

[[root.children]]
[root.children.node]
node_id = "particles_authoring_toolbar"
kind = "native"
type = "Space"
control_id = "ParticlesAuthoringToolbar"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
min = 32.0
preferred = 32.0
max = 32.0
stretch = "Fixed"

