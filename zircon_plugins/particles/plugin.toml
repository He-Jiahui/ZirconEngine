id = "particles"
version = "0.1.0"
sdk_api_version = "0.1.0"
display_name = "Particles"
category = "runtime"
description = "Optional particles runtime and editor package."
maturity = "experimental"
supported_targets = ["client_runtime", "editor_host"]
capabilities = ["runtime.plugin.particles"]
default_packaging = ["source_template", "library_embed"]

[[capability_statuses]]
capability = "runtime.plugin.particles"
status = "partial"
note = "Advanced optional VFX capability; not a Bevy default parity blocker."

[[event_catalogs]]
namespace = "particles.dynamic_events"
version = 1
events = [
    { id = "particles.dynamic_events.spawn_once", display_name = "Spawn Once", payload_schema = "particles.dynamic.spawn_once.v1" },
    { id = "particles.dynamic_events.begin_emission", display_name = "Begin Emission", payload_schema = "particles.dynamic.begin_emission.v1" },
    { id = "particles.dynamic_events.end_emission", display_name = "End Emission", payload_schema = "particles.dynamic.end_emission.v1" },
]

[[optional_features]]
id = "particles.physics"
display_name = "Physical Particles"
owner_plugin_id = "particles"
capabilities = ["runtime.feature.particles.physics"]
default_packaging = ["source_template", "library_embed"]
enabled_by_default = false

[[optional_features.dependencies]]
plugin_id = "particles"
capability = "runtime.plugin.particles"
primary = true

[[optional_features.dependencies]]
plugin_id = "physics"
capability = "runtime.plugin.physics"
primary = false

[[optional_features]]
id = "particles.animation_control"
display_name = "Animation Controlled Particles"
owner_plugin_id = "particles"
capabilities = ["runtime.feature.particles.animation_control"]
default_packaging = ["source_template", "library_embed"]
enabled_by_default = false

[[optional_features.dependencies]]
plugin_id = "particles"
capability = "runtime.plugin.particles"
primary = true

[[optional_features.dependencies]]
plugin_id = "animation"
capability = "runtime.plugin.animation"
primary = false

[[optional_features]]
id = "particles.gpu_simulation"
display_name = "GPU Particle Simulation"
owner_plugin_id = "particles"
capabilities = ["runtime.feature.particles.gpu_simulation"]
default_packaging = ["source_template", "library_embed"]
enabled_by_default = false

[[optional_features.dependencies]]
plugin_id = "particles"
capability = "runtime.plugin.particles"
primary = true

[[optional_features.dependencies]]
plugin_id = "render_graph"
capability = "runtime.module.render_graph"
primary = false

[[modules]]
name = "particles.runtime"
kind = "runtime"
crate_name = "zircon_plugin_particles_runtime"
target_modes = ["client_runtime", "editor_host"]
capabilities = ["runtime.plugin.particles"]

[[modules]]
name = "particles.editor"
kind = "editor"
crate_name = "zircon_plugin_particles_editor"
target_modes = ["editor_host"]
capabilities = ["editor.extension.particles_authoring"]
