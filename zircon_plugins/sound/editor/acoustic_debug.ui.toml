stylesheets = []

[asset]
kind = "layout"
id = "sound.acoustic_debug"
version = 1
display_name = "Acoustic Debug"

[imports]
styles = ["res://ui/theme/editor_base.ui.toml"]

[root]
node_id = "sound_acoustic_debug_root"
kind = "native"
type = "VerticalBox"
control_id = "SoundAcousticDebugRoot"
classes = ["editor-shell"]

[root.layout.container]
kind = "VerticalBox"
gap = 6.0

[root.layout.width]
stretch = "Stretch"

[root.layout.height]
stretch = "Stretch"

[[root.children]]
[root.children.node]
node_id = "sound_acoustic_toolbar"
kind = "native"
type = "Space"
control_id = "SoundAcousticDebugToolbar"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
min = 32.0
preferred = 32.0
max = 32.0
stretch = "Fixed"

[[root.children]]
[root.children.node]
node_id = "sound_acoustic_layers"
kind = "native"
type = "HorizontalBox"
control_id = "SoundAcousticDebugLayers"

[root.children.node.layout.container]
kind = "HorizontalBox"
gap = 6.0

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.layout.height]
stretch = "Stretch"

[[root.children.node.children]]
[root.children.node.children.node]
