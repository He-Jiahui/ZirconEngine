id = "shader_wgsl_importer"
version = "0.1.0"
sdk_api_version = "0.1.0"
display_name = "WGSL Shader Importer"
category = "asset_importer"
description = "Runtime WGSL shader importer package."
supported_targets = ["client_runtime", "editor_host"]
supported_platforms = ["windows", "linux", "macos"]
capabilities = [
    "runtime.plugin.shader_wgsl_importer",
    "runtime.asset.importer.shader.wgsl",
]
asset_roots = []
content_roots = []
default_packaging = ["source_template", "library_embed"]

[[asset_importers]]
id = "shader_wgsl_importer.wgsl"
plugin_id = "shader_wgsl_importer"
priority = 120
source_extensions = ["wgsl"]
output_kind = "Shader"
importer_version = 1
required_capabilities = ["runtime.asset.importer.shader.wgsl"]

[[modules]]
name = "shader_wgsl_importer.runtime"
kind = "runtime"
crate_name = "zircon_plugin_shader_wgsl_importer_runtime"
target_modes = ["client_runtime", "editor_host"]
capabilities = [
    "runtime.plugin.shader_wgsl_importer",
    "runtime.asset.importer.shader.wgsl",
]
