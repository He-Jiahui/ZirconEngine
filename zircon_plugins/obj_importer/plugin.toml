id = "obj_importer"
version = "0.1.0"
sdk_api_version = "0.1.0"
display_name = "OBJ Importer"
category = "asset_importer"
description = "Runtime Wavefront OBJ model importer package."
supported_targets = ["client_runtime", "editor_host"]
supported_platforms = ["windows", "linux", "macos"]
capabilities = [
    "runtime.plugin.obj_importer",
    "runtime.asset.importer.model.obj",
]
asset_roots = []
content_roots = []
default_packaging = ["source_template", "library_embed"]

[[asset_importers]]
id = "obj_importer.obj"
plugin_id = "obj_importer"
priority = 120
source_extensions = ["obj"]
output_kind = "Model"
importer_version = 1
required_capabilities = ["runtime.asset.importer.model.obj"]

[[modules]]
name = "obj_importer.runtime"
kind = "runtime"
crate_name = "zircon_plugin_obj_importer_runtime"
target_modes = ["client_runtime", "editor_host"]
capabilities = [
    "runtime.plugin.obj_importer",
    "runtime.asset.importer.model.obj",
]
