name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system dependencies (winit / wgpu / slint)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfontconfig-dev \
            libudev-dev \
            libinput-dev \
            libdbus-1-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            xinput \
            libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --locked --verbose

      - name: Run unit tests
        run: cargo test --workspace --locked --verbose

      - name: Check plugin workspace
        run: cargo check --manifest-path zircon_plugins/Cargo.toml --workspace --locked --all-targets --verbose
