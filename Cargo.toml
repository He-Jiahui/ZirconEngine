[workspace]
members = [
    "ziron_core",
    "ziron_math",
    "ziron_graphics",
    "ziron_physics",
    "ziron_sound",
    "ziron_texture",
    "ziron_ui",
    "ziron_asset",
    "ziron_scene",
    "ziron_platform",
    "ziron_editor",
    "ziron_server",
    "ziron_module",
    "ziron_app",
    "ziron_script",
    "ziron_animation",
    "ziron_net",
    "ziron_input",
    "ziron_navigation",
    "ziron_particles",
]
resolver = "2"
default-members = ["ziron_core", "ziron_math"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

# 仅多 crate 共用的版本；其余依赖写在各 ziron_* 的 Cargo.toml 中。
[workspace.dependencies]
glam = "0.32.1"
serde = { version = "1.0.228", features = ["derive"] }
winit = "0.30.13"
