<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zircon Hybrid Shell Prototype</title>
  <style>
    :root{--bg:#22262d;--bg2:#2b3038;--bg3:#1d2026;--line:#3a404b;--text:#d6dae3;--muted:#99a2b2;--strong:#f4f6f9;--accent:#4c9fff;--accentSoft:rgba(76,159,255,.16);--rail:52px;--left:288px;--right:54px;--bottom:224px;font-family:"Segoe UI Variable","Microsoft YaHei UI","Segoe UI",sans-serif;color-scheme:dark}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at 0 0,rgba(76,159,255,.12),transparent 24%),linear-gradient(180deg,#272b33,#1f2228);color:var(--text)}
    button{font:inherit} #app{height:100vh;padding:14px}
    .shell{display:grid;grid-template-rows:42px 1fr 26px;gap:10px;height:100%}
    .bar,.status{display:flex;align-items:center;justify-content:space-between;padding:0 12px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(180deg,rgba(50,56,66,.96),rgba(33,36,43,.96))}
    .brand,.menu,.presets,.statusside{display:flex;align-items:center;gap:10px}.mark{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#67b1ff,#327fdf)} h1{margin:0;font-size:13px;font-weight:600;color:var(--strong)} .menu span,.status span{font-size:12px;color:var(--muted)}
    .preset{padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}.preset.active,.preset:hover{border-color:rgba(76,159,255,.55);background:var(--accentSoft);color:var(--strong)}
    .workspace{display:grid;grid-template-columns:var(--rail) var(--left) 1fr var(--right);grid-template-rows:1fr var(--bottom);gap:10px;min-height:0}
    .panel,.doc,.rail{border:1px solid var(--line);border-radius:10px;background:linear-gradient(180deg,rgba(44,49,58,.98),rgba(35,39,47,.98));overflow:hidden;min-height:0}
    .rail{grid-row:1/span 2;display:flex;flex-direction:column;align-items:center;padding:8px 6px;gap:8px;background:linear-gradient(180deg,rgba(49,55,65,.98),rgba(29,32,38,.98))}
    .rail button{width:38px;height:38px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer}.rail button.active,.rail button:hover{border-color:rgba(76,159,255,.35);background:var(--accentSoft);color:var(--strong)}
    .left{grid-column:2;grid-row:1}.right{grid-column:4;grid-row:1}.bottom{grid-column:2/span 3;grid-row:2;display:grid;grid-template-rows:38px 1fr}.doc{grid-column:3;grid-row:1;display:grid;grid-template-rows:38px 1fr}
    .head{height:38px;padding:0 10px;border-bottom:1px solid #313743;background:linear-gradient(180deg,rgba(56,61,71,.82),rgba(38,42,49,.82));display:flex;align-items:center;justify-content:space-between;gap:8px}.title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    .tabs{display:flex;gap:6px;overflow:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
    .tab{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}.tab.active{background:linear-gradient(180deg,rgba(72,79,92,.86),rgba(48,54,64,.86));border-color:rgba(76,159,255,.28);color:var(--strong)}
    .tab .icon,.rail .icon{font:600 11px/1 "JetBrains Mono","Consolas",monospace}
    .body{height:calc(100% - 38px);padding:10px;overflow:auto;background:linear-gradient(180deg,rgba(43,48,56,.9),rgba(36,40,48,.96))}
    .collapsed .tabs{display:none}.collapsed .body{display:flex;align-items:center;justify-content:center;padding:0;font-size:11px;color:var(--muted)}
    .empty{display:flex;flex-direction:column;justify-content:center;gap:10px;min-height:100%;max-width:520px;margin:0 auto}.empty.compact{max-width:none}
    .eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)} .empty h2{margin:0;font-size:28px;color:var(--strong)} .empty p{margin:0;color:var(--muted);line-height:1.55}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.primary,.secondary{padding:8px 12px;border-radius:8px;cursor:pointer}.primary{border:1px solid transparent;background:linear-gradient(180deg,#4f9eff,#327fdf);color:#fff}.secondary{border:1px solid var(--line);background:transparent;color:var(--muted)}
    .meta,.tree,.console{display:grid;gap:8px}.row{display:flex;gap:8px;align-items:center;min-height:30px;padding:0 10px;border-radius:7px;background:rgba(255,255,255,.02)} .row.active{background:var(--accentSoft);color:var(--strong);border:1px solid rgba(76,159,255,.24)}
    .key{width:88px;color:var(--muted);flex:0 0 auto}.value{color:var(--strong)}
    .viewport{position:relative;height:100%;border-radius:8px;border:1px solid rgba(255,255,255,.04);background:linear-gradient(180deg,rgba(37,41,49,.35),rgba(24,27,33,.82)),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(0deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:auto,28px 28px,28px 28px}
    .tools{position:absolute;top:10px;left:10px;display:flex;gap:6px;padding:6px;border-radius:9px;background:rgba(27,31,38,.76);border:1px solid rgba(255,255,255,.08)} .tool{padding:6px 10px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--muted)} .tool.active{border-color:rgba(76,159,255,.36);background:var(--accentSoft);color:var(--strong)}
    @media (max-width:920px){.workspace{grid-template-columns:var(--rail) 1fr;grid-template-rows:280px 1fr 180px}.rail{grid-row:1/span 3}.left,.right{grid-column:2;grid-row:1}.doc{grid-column:2;grid-row:2}.bottom{grid-column:2;grid-row:3}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const D={descriptors:[["editor.project","Project","PR"],["editor.assets","Assets","AS"],["editor.hierarchy","Hierarchy","HI"],["editor.inspector","Inspector","IN"],["editor.console","Console","CO"],["editor.scene","Scene","SC"],["editor.game","Game","GM"],["editor.prefab","Prefab Editor","PF"]],instances:{"editor.project#1":["editor.project","Project",null],"editor.assets#1":["editor.assets","Assets",{root:"crate://"}],"editor.hierarchy#1":["editor.hierarchy","Hierarchy",null],"editor.inspector#1":["editor.inspector","Inspector",null],"editor.console#1":["editor.console","Console",null],"editor.scene#1":["editor.scene","Scene",null],"editor.game#1":["editor.game","Game",null]},editorData:{scene_entries:[],inspector:null,status_line:"",viewport_size:[1280,720],mesh_import_path:"",project_path:"",project_open:false},layout:{active_main_page:"workbench",main_pages:[{WorkbenchPage:{id:"workbench",title:"Workbench",document_workspace:{Tabs:{tabs:["editor.scene#1","editor.game#1"],active_tab:"editor.scene#1"}}}}],drawers:{LeftTop:{slot:"LeftTop",tab_stack:{tabs:["editor.project#1","editor.assets#1","editor.hierarchy#1"],active_tab:"editor.project#1"},active_view:"editor.project#1",mode:"Pinned",extent:288,visible:true},LeftBottom:{slot:"LeftBottom",tab_stack:{tabs:[],active_tab:null},active_view:null,mode:"Collapsed",extent:288,visible:true},RightTop:{slot:"RightTop",tab_stack:{tabs:["editor.inspector#1"],active_tab:"editor.inspector#1"},active_view:"editor.inspector#1",mode:"Collapsed",extent:320,visible:true},RightBottom:{slot:"RightBottom",tab_stack:{tabs:[],active_tab:null},active_view:null,mode:"Collapsed",extent:288,visible:true},BottomLeft:{slot:"BottomLeft",tab_stack:{tabs:["editor.console#1"],active_tab:"editor.console#1"},active_view:"editor.console#1",mode:"Pinned",extent:224,visible:true},BottomRight:{slot:"BottomRight",tab_stack:{tabs:[],active_tab:null},active_view:null,mode:"Collapsed",extent:224,visible:true}},floating_windows:[]}};
const DES=new Map(D.descriptors.map(v=>[v[0],{id:v[0],title:v[1],icon:v[2]}])); const PRESETS={builtin:{label:"Builtin Hybrid",layout:copy(D.layout),editorData:copy(D.editorData)},projectRight:{label:"Project Right",layout:rightLayout(),editorData:copy(D.editorData)}}; const RAIL=["editor.project#1","editor.assets#1","editor.hierarchy#1","editor.inspector#1","editor.console#1"]; const S={preset:"builtin",presets:copy(PRESETS)};
function copy(v){return JSON.parse(JSON.stringify(v))}
function rightLayout(){const l=copy(D.layout);l.drawers.LeftTop.tab_stack.tabs=["editor.assets#1","editor.hierarchy#1"];l.drawers.LeftTop.tab_stack.active_tab="editor.assets#1";l.drawers.LeftTop.active_view="editor.assets#1";l.drawers.RightTop.tab_stack.tabs=["editor.project#1","editor.inspector#1"];l.drawers.RightTop.tab_stack.active_tab="editor.project#1";l.drawers.RightTop.active_view="editor.project#1";l.drawers.RightTop.mode="Pinned";return l}
function cur(){return S.presets[S.preset]} function drawer(slot){return cur().layout.drawers[slot]} function inst(id){const [descriptorId,title,payload]=D.instances[id]; return{id,descriptorId,title,payload,icon:DES.get(descriptorId).icon}} function tabs(ids){return ids.map(inst)} function activeDoc(){return cur().layout.main_pages[0].WorkbenchPage.document_workspace.Tabs} function closeable(id){return id==="editor.prefab"} function drawerOf(id){return Object.entries(cur().layout.drawers).find(([,d])=>d.tab_stack.tabs.includes(id))}
function empty(descriptorId){const data=cur().editorData;if((descriptorId==="editor.project"||descriptorId==="editor.assets")&&!data.project_open)return{eyebrow:"Hybrid Shell",title:"No project open",body:"Open a project to browse the workspace, assets, and content roots.",primary:"Open Project",hint:"Recent Projects stays in the File menu."}; if(descriptorId==="editor.hierarchy"&&!data.project_open)return{title:"No scene loaded",body:"Hierarchy does not render a fake tree before a real scene exists."}; if(descriptorId==="editor.scene"&&!data.project_open)return{eyebrow:"Welcome",title:"No project open",body:"Scene and Game remain permanent document tabs, but pane-owned empty states still drive the content.",primary:"Open Project"}; if(descriptorId==="editor.inspector"&&!data.inspector)return{title:"Nothing selected",body:"Inspector stays clean instead of showing disabled fields."}; if(descriptorId==="editor.console")return data.status_line?{title:"Last task status",body:data.status_line}:{title:"No output yet",body:"Recent task output will appear here."}; return null}
function emptyHtml(e,compact){return `<div class="empty${compact?" compact":""}">${e.eyebrow?`<div class="eyebrow">${e.eyebrow}</div>`:""}<h2>${e.title}</h2><p>${e.body}</p>${e.primary||e.secondary||e.hint?`<div class="actions">${e.primary?`<button class="primary" type="button">${e.primary}</button>`:""}${e.secondary?`<button class="secondary" type="button">${e.secondary}</button>`:""}${e.hint?`<span>${e.hint}</span>`:""}</div>`:""}</div>`}
function paneBody(v,compact){const e=empty(v.descriptorId); if(e)return emptyHtml(e,compact); const data=cur().editorData; if(v.descriptorId==="editor.project")return `<div class="meta"><div class="row"><span class="key">Workspace</span><span class="value">${data.project_path||"No project loaded"}</span></div><div class="row"><span class="key">Location</span><span class="value">${drawerOf(v.id)?.[0]||"Unknown"}</span></div><div class="row"><span class="key">Contract</span><span class="value">Pane-owned empty state, layout-agnostic semantics</span></div></div>`; if(v.descriptorId==="editor.assets")return `<div class="meta"><div class="row"><span class="key">Root</span><span class="value">${v.payload?.root||"crate://"}</span></div><div class="row"><span class="key">Commands</span><span class="value">Project, layout, and open-view stay menu-driven</span></div><div class="row"><span class="key">Import</span><span class="value">Asset operations remain pane-local</span></div></div>`; if(v.descriptorId==="editor.console")return `<div class="console"><div class="row">${data.status_line||"No output yet"}</div><div class="row">Console can move without changing semantics.</div></div>`; if(v.descriptorId==="editor.scene"||v.descriptorId==="editor.game")return `<div class="viewport"><div class="tools"><button class="tool active" type="button">Translate</button><button class="tool" type="button">Rotate</button><button class="tool" type="button">Scale</button></div>${emptyHtml({eyebrow:"Viewport",title:v.title,body:"The center viewport dominates the shell. Scene and Game are permanent non-closeable documents."},false)}</div>`; return `<div class="meta"><div class="row">No preview content defined.</div></div>`}
function stack(slot,cls,label){const d=drawer(slot),ts=tabs(d.tab_stack.tabs),activeId=d.active_view||d.tab_stack.active_tab||ts[0]?.id,active=ts.find(t=>t.id===activeId)||ts[0],collapsed=d.mode==="Collapsed"; return `<section class="panel ${cls} ${collapsed?"collapsed":""}"><div class="head"><div class="title">${label}</div><div class="tabs">${ts.map(t=>`<button class="tab ${!collapsed&&t.id===activeId?"active":""}" type="button" data-drawer="${slot}:${t.id}"><span class="icon">${t.icon}</span><span>${t.title}</span></button>`).join("")}</div></div><div class="body">${collapsed?(ts[0]?`<span class="icon">${ts[0].icon}</span>`:""):(active?paneBody(active,true):'<span>Empty stack</span>')}</div></section>`}
function documentHtml(){const st=activeDoc(),ts=tabs(st.tabs),active=ts.find(t=>t.id===st.active_tab)||ts[0]; return `<section class="doc"><div class="head"><div class="title">DocumentTabs</div><div class="tabs">${ts.map(t=>`<button class="tab ${t.id===active.id?"active":""}" type="button" data-doc="${t.id}"><span class="icon">${t.icon}</span><span>${t.title}</span><span>${closeable(t.descriptorId)?"x":"lock"}</span></button>`).join("")}</div></div><div class="body">${paneBody(active,false)}</div></section>`}
function railHtml(){return `<nav class="rail">${RAIL.map(id=>{const v=inst(id),d=drawerOf(id),active=d&&(drawer(d[0]).mode!=="Collapsed")&&(drawer(d[0]).active_view===id||drawer(d[0]).tab_stack.active_tab===id); return `<button class="${active?"active":""}" type="button" data-rail="${id}" title="${v.title}"><span class="icon">${v.icon}</span></button>`}).join("")}</nav>`}
function setVars(){document.documentElement.style.setProperty("--left",drawer("LeftTop").mode==="Collapsed"||!drawer("LeftTop").tab_stack.tabs.length?"54px":`${drawer("LeftTop").extent}px`);document.documentElement.style.setProperty("--right",drawer("RightTop").mode==="Collapsed"||!drawer("RightTop").tab_stack.tabs.length?"54px":`${drawer("RightTop").extent}px`);document.documentElement.style.setProperty("--bottom",drawer("BottomLeft").mode==="Collapsed"||!drawer("BottomLeft").tab_stack.tabs.length?"44px":`${drawer("BottomLeft").extent}px`)}
function render(){setVars(); const p=cur(); document.getElementById("app").innerHTML=`<div class="shell"><header class="bar"><div class="brand"><div class="mark"></div><h1>Zircon Editor / JetBrains Hybrid Workbench Shell</h1><div class="menu"><span>File</span><span>Edit</span><span>Selection</span><span>View</span><span>Window</span></div></div><div class="presets">${Object.entries(S.presets).map(([k,v])=>`<button class="preset ${S.preset===k?"active":""}" type="button" data-preset="${k}">${v.label}</button>`).join("")}</div></header><main class="workspace">${railHtml()}${stack("LeftTop","left","ToolWindow / Left")}${documentHtml()}${stack("RightTop","right","ToolWindow / Right")}<section class="panel bottom"><div class="head"><div class="title">ToolWindow / Console</div><div class="tabs">${tabs(drawer("BottomLeft").tab_stack.tabs).map(t=>`<button class="tab active" type="button" data-drawer="BottomLeft:${t.id}"><span class="icon">${t.icon}</span><span>${t.title}</span></button>`).join("")}</div></div><div class="body">${paneBody(tabs(drawer("BottomLeft").tab_stack.tabs)[0],true)}</div></section></main><footer class="status"><div class="statusside"><span>StatusBar</span><span>Preset: ${p.label}</span></div><div class="statusside"><span>Fixture-shaped JSON</span><span>project_open = ${String(p.editorData.project_open)}</span><span>${p.editorData.viewport_size[0]} x ${p.editorData.viewport_size[1]}</span></div></footer></div>`;
document.querySelectorAll("[data-preset]").forEach(b=>b.onclick=()=>{S.preset=b.dataset.preset;render()});
document.querySelectorAll("[data-rail]").forEach(b=>b.onclick=()=>toggleRail(b.dataset.rail));
document.querySelectorAll("[data-drawer]").forEach(b=>b.onclick=()=>{const [slot,id]=b.dataset.drawer.split(":");const d=drawer(slot);d.mode="Pinned";d.active_view=id;d.tab_stack.active_tab=id;render()});
document.querySelectorAll("[data-doc]").forEach(b=>b.onclick=()=>{activeDoc().active_tab=b.dataset.doc;render()})}
function toggleRail(id){const target=drawerOf(id); if(!target)return; const [slot,d]=target; const same=d.active_view===id||d.tab_stack.active_tab===id; if(same&&d.mode!=="Collapsed")d.mode="Collapsed"; else{d.mode="Pinned";d.active_view=id;d.tab_stack.active_tab=id} render()}
render();
</script>
</body>
</html>
