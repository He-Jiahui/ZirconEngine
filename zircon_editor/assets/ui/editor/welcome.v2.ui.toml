stylesheets = []

[asset]
kind = "view"
id = "editor.welcome.v2"
version = 2
display_name = "Welcome"

[imports]
styles = ["res://ui/theme/editor_base.v2.ui.toml", "res://ui/theme/editor_material.v2.ui.toml"]

[root]
node = "welcome_root"

[nodes.top_space]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" } }

[nodes.left_space]
component = "Space"
layout = { width = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }

[nodes.recent_panel_top_space]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 26.0, preferred = 26.0, max = 26.0, stretch = "Fixed" } }

[nodes.recent_header_panel]
component = "Space"
control_id = "WelcomeRecentHeaderPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 54.0, preferred = 54.0, max = 54.0, stretch = "Fixed" } }

[nodes.recent_header_list_gap]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 14.0, preferred = 14.0, max = 14.0, stretch = "Fixed" } }

[nodes.recent_list_panel]
component = "Space"
control_id = "WelcomeRecentListPanel"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, scroll = { vertical = true } }

[nodes.recent_panel]
component = "VerticalBox"
control_id = "WelcomeRecentPanel"
layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { min = 320.0, preferred = 320.0, max = 320.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }
children = [{ node = "recent_panel_top_space" }, { node = "recent_header_panel" }, { node = "recent_header_list_gap" }, { node = "recent_list_panel" }]

[nodes.main_panel_top_space]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 28.0, preferred = 28.0, max = 28.0, stretch = "Fixed" } }

[nodes.startup_chooser_button_workbench]
component = "Button"
control_id = "WelcomeStartupWorkbenchButton"
classes = ["showcase-field", "material-control", "material-button", "material-text-button"]
props = { text = "Default Workbench", height = 30.0 }
events = [{ id = "Welcome/OpenStartupWorkbench", event = "Click", route = "Welcome.OpenStartupWorkbench" }]

[nodes.startup_chooser_button_demo]
component = "Button"
control_id = "WelcomeStartupDemoButton"
classes = ["showcase-field", "material-control", "material-button", "material-text-button"]
props = { text = "Material Demo", height = 30.0 }
events = [{ id = "Welcome/OpenStartupDemo", event = "Click", route = "Welcome.OpenStartupDemo" }]

[nodes.startup_chooser_button_asset]
component = "Button"
control_id = "WelcomeStartupAssetWindowButton"
classes = ["showcase-field", "material-control", "material-button", "material-text-button"]
props = { text = "Asset Window", height = 30.0 }
events = [{ id = "Welcome/OpenStartupAssetWindow", event = "Click", route = "Welcome.OpenStartupAssetWindow" }]

[nodes.startup_chooser_button_ui_layout]
component = "Button"
control_id = "WelcomeStartupUILayoutEditorButton"
classes = ["showcase-field", "material-control", "material-button", "material-text-button"]
props = { text = "UI Layout Editor", height = 30.0 }
events = [{ id = "Welcome/OpenStartupUILayoutEditor", event = "Click", route = "Welcome.OpenStartupUILayoutEditor" }]

[nodes.startup_chooser_row]
component = "HorizontalBox"
control_id = "WelcomeStartupChooserRow"
layout = { container = { kind = "HorizontalBox", gap = 10.0 }, width = { stretch = "Stretch" }, height = { min = 30.0, preferred = 30.0, max = 30.0, stretch = "Fixed" } }
children = [
  { node = "startup_chooser_button_workbench" },
  { node = "startup_chooser_button_demo" },
  { node = "startup_chooser_button_asset" },
  { node = "startup_chooser_button_ui_layout" },
]

[nodes.hero_panel]
component = "Space"
control_id = "WelcomeHeroPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 84.0, preferred = 84.0, max = 84.0, stretch = "Fixed" } }

[nodes.hero_status_gap]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 12.0, preferred = 12.0, max = 12.0, stretch = "Fixed" } }

[nodes.status_panel]
component = "Space"
control_id = "WelcomeStatusPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 30.0, preferred = 30.0, max = 30.0, stretch = "Fixed" } }

[nodes.status_new_project_gap]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 22.0, preferred = 22.0, max = 22.0, stretch = "Fixed" } }

[nodes.new_project_header_panel]
component = "Space"
control_id = "WelcomeNewProjectHeaderPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 46.0, preferred = 46.0, max = 46.0, stretch = "Fixed" } }

[nodes.new_project_name_gap]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 16.0, preferred = 16.0, max = 16.0, stretch = "Fixed" } }

[nodes.project_name_field]
component = "TextField"
control_id = "WelcomeProjectNameField"
classes = ["showcase-field", "material-control", "material-outlined-field"]
props = { value = "ZirconProject", placeholder = "Project name", validation_level = "normal", height = 56.0 }
layout = { width = { stretch = "Stretch" }, height = { min = 64.0, preferred = 64.0, max = 64.0, stretch = "Fixed" } }

[nodes.project_name_location_gap]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 12.0, preferred = 12.0, max = 12.0, stretch = "Fixed" } }

[nodes.location_field]
component = "TextField"
control_id = "WelcomeLocationField"
classes = ["showcase-field", "material-control", "material-outlined-field"]
props = { value = "Documents/ZirconProjects", placeholder = "Location", validation_level = "normal", height = 56.0 }
layout = { width = { stretch = "Stretch" }, height = { min = 64.0, preferred = 64.0, max = 64.0, stretch = "Fixed" } }

[nodes.location_preview_gap]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 14.0, preferred = 14.0, max = 14.0, stretch = "Fixed" } }

[nodes.preview_panel]
component = "Space"
control_id = "WelcomePreviewPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 72.0, preferred = 72.0, max = 72.0, stretch = "Fixed" } }

[nodes.preview_bottom_fill]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.validation_panel]
component = "Space"
control_id = "WelcomeValidationPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 36.0, preferred = 36.0, max = 36.0, stretch = "Fixed" } }

[nodes.validation_actions_gap]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 12.0, preferred = 12.0, max = 12.0, stretch = "Fixed" } }

[nodes.actions_row_fill]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.open_existing_button]
component = "Button"
control_id = "WelcomeOpenExistingButton"
classes = ["showcase-field", "material-control", "material-button", "material-text-button"]
props = { text = "Open", height = 32.0 }
events = [{ id = "Welcome/OpenExisting", event = "Click", route = "Welcome.OpenExisting" }]

[nodes.create_project_button]
component = "Button"
control_id = "WelcomeCreateProjectButton"
classes = ["showcase-field", "material-control", "material-button", "material-button-primary"]
props = { text = "Create Project", surface_variant = "accent", button_variant = "primary", validation_level = "normal", height = 32.0 }
events = [{ id = "Welcome/CreateProject", event = "Click", route = "Welcome.CreateProject" }]

[nodes.actions_row]
component = "HorizontalBox"
control_id = "WelcomeActionsRow"
layout = { container = { kind = "HorizontalBox", gap = 10.0 }, width = { stretch = "Stretch" }, height = { min = 32.0, preferred = 32.0, max = 32.0, stretch = "Fixed" } }
children = [{ node = "actions_row_fill" }, { node = "open_existing_button", slot = { layout = { width = { min = 132.0, preferred = 132.0, max = 132.0, stretch = "Fixed" } } } }, { node = "create_project_button", slot = { layout = { width = { min = 150.0, preferred = 150.0, max = 150.0, stretch = "Fixed" } } } }]

[nodes.main_panel_bottom_space]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" } }

[nodes.main_panel]
component = "VerticalBox"
control_id = "WelcomeMainPanel"
layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ node = "main_panel_top_space" }, { node = "startup_chooser_row" }, { node = "hero_panel" }, { node = "hero_status_gap" }, { node = "status_panel" }, { node = "status_new_project_gap" }, { node = "new_project_header_panel" }, { node = "new_project_name_gap" }, { node = "project_name_field" }, { node = "project_name_location_gap" }, { node = "location_field" }, { node = "location_preview_gap" }, { node = "preview_panel" }, { node = "preview_bottom_fill" }, { node = "validation_panel" }, { node = "validation_actions_gap" }, { node = "actions_row" }, { node = "main_panel_bottom_space" }]

[nodes.outer_panel]
component = "HorizontalBox"
control_id = "WelcomeOuterPanel"
layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ node = "recent_panel" }, { node = "main_panel" }]

[nodes.right_space]
component = "Space"
layout = { width = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }

[nodes.content_row]
component = "HorizontalBox"
layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ node = "left_space" }, { node = "outer_panel" }, { node = "right_space" }]

[nodes.bottom_space]
component = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" } }

[nodes.welcome_root]
component = "VerticalBox"
control_id = "WelcomeRoot"
classes = ["editor-shell", "showcase-shell"]
layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ node = "top_space" }, { node = "content_row" }, { node = "bottom_space" }]
