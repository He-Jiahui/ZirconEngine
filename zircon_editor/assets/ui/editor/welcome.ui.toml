stylesheets = []

[asset]
kind = "layout"
id = "editor.welcome"
version = 1
display_name = "Welcome"

[imports]
widgets = ["res://ui/editor/material_meta_components.ui.toml#MaterialOutlinedField", "res://ui/editor/material_meta_components.ui.toml#MaterialButton", "res://ui/editor/material_meta_components.ui.toml#MaterialTextButton", "res://ui/editor/material_meta_components.ui.toml#MaterialListItem"]
styles = ["res://ui/theme/editor_base.ui.toml", "res://ui/theme/editor_material.ui.toml"]

[root]
node = "welcome_root"

[nodes.top_space]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" } }

[nodes.left_space]
kind = "native"
type = "Space"
layout = { width = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }

[nodes.recent_panel_top_space]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 26.0, preferred = 26.0, max = 26.0, stretch = "Fixed" } }

[nodes.recent_header_panel]
kind = "native"
type = "Space"
control_id = "WelcomeRecentHeaderPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 54.0, preferred = 54.0, max = 54.0, stretch = "Fixed" } }

[nodes.recent_header_list_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 14.0, preferred = 14.0, max = 14.0, stretch = "Fixed" } }

[nodes.recent_list_panel]
kind = "native"
type = "Space"
control_id = "WelcomeRecentListPanel"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, scroll = { vertical = true } }

[nodes.recent_panel]
kind = "native"
type = "VerticalBox"
control_id = "WelcomeRecentPanel"
layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { min = 320.0, preferred = 320.0, max = 320.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }
children = [{ child = "recent_panel_top_space" }, { child = "recent_header_panel" }, { child = "recent_header_list_gap" }, { child = "recent_list_panel" }]

[nodes.main_panel_top_space]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 28.0, preferred = 28.0, max = 28.0, stretch = "Fixed" } }

[nodes.hero_panel]
kind = "native"
type = "Space"
control_id = "WelcomeHeroPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 84.0, preferred = 84.0, max = 84.0, stretch = "Fixed" } }

[nodes.hero_status_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 12.0, preferred = 12.0, max = 12.0, stretch = "Fixed" } }

[nodes.status_panel]
kind = "native"
type = "Space"
control_id = "WelcomeStatusPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 30.0, preferred = 30.0, max = 30.0, stretch = "Fixed" } }

[nodes.status_new_project_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 22.0, preferred = 22.0, max = 22.0, stretch = "Fixed" } }

[nodes.new_project_header_panel]
kind = "native"
type = "Space"
control_id = "WelcomeNewProjectHeaderPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 46.0, preferred = 46.0, max = 46.0, stretch = "Fixed" } }

[nodes.new_project_name_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 16.0, preferred = 16.0, max = 16.0, stretch = "Fixed" } }

[nodes.project_name_field]
kind = "reference"
component_ref = "res://ui/editor/material_meta_components.ui.toml#MaterialOutlinedField"
control_id = "WelcomeProjectNameField"
classes = ["showcase-field"]
params = { value = "ZirconProject", placeholder = "Project name", validation_level = "normal", height = 56.0 }
layout = { width = { stretch = "Stretch" }, height = { min = 64.0, preferred = 64.0, max = 64.0, stretch = "Fixed" } }

[nodes.project_name_location_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 12.0, preferred = 12.0, max = 12.0, stretch = "Fixed" } }

[nodes.location_field]
kind = "reference"
component_ref = "res://ui/editor/material_meta_components.ui.toml#MaterialOutlinedField"
control_id = "WelcomeLocationField"
classes = ["showcase-field"]
params = { value = "Documents/ZirconProjects", placeholder = "Location", validation_level = "normal", height = 56.0 }
layout = { width = { stretch = "Stretch" }, height = { min = 64.0, preferred = 64.0, max = 64.0, stretch = "Fixed" } }

[nodes.location_preview_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 14.0, preferred = 14.0, max = 14.0, stretch = "Fixed" } }

[nodes.preview_panel]
kind = "native"
type = "Space"
control_id = "WelcomePreviewPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 72.0, preferred = 72.0, max = 72.0, stretch = "Fixed" } }

[nodes.preview_bottom_fill]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.validation_panel]
kind = "native"
type = "Space"
control_id = "WelcomeValidationPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 36.0, preferred = 36.0, max = 36.0, stretch = "Fixed" } }

[nodes.validation_actions_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 12.0, preferred = 12.0, max = 12.0, stretch = "Fixed" } }

[nodes.actions_row_fill]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.open_existing_button]
kind = "reference"
component_ref = "res://ui/editor/material_meta_components.ui.toml#MaterialTextButton"
control_id = "WelcomeOpenExistingButton"
classes = ["showcase-field"]
params = { text = "Open", height = 32.0 }
bindings = [{ id = "Welcome/OpenExisting", event = "Click", route = "Welcome.OpenExisting" }]

[nodes.create_project_button]
kind = "reference"
component_ref = "res://ui/editor/material_meta_components.ui.toml#MaterialButton"
control_id = "WelcomeCreateProjectButton"
classes = ["showcase-field"]
params = { text = "Create Project", surface_variant = "accent", button_variant = "primary", validation_level = "normal", height = 32.0 }
bindings = [{ id = "Welcome/CreateProject", event = "Click", route = "Welcome.CreateProject" }]

[nodes.actions_row]
kind = "native"
type = "HorizontalBox"
control_id = "WelcomeActionsRow"
layout = { container = { kind = "HorizontalBox", gap = 10.0 }, width = { stretch = "Stretch" }, height = { min = 32.0, preferred = 32.0, max = 32.0, stretch = "Fixed" } }
children = [{ child = "actions_row_fill" }, { child = "open_existing_button", slot = { layout = { width = { min = 132.0, preferred = 132.0, max = 132.0, stretch = "Fixed" } } } }, { child = "create_project_button", slot = { layout = { width = { min = 150.0, preferred = 150.0, max = 150.0, stretch = "Fixed" } } } }]

[nodes.main_panel_bottom_space]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" } }

[nodes.main_panel]
kind = "native"
type = "VerticalBox"
control_id = "WelcomeMainPanel"
layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ child = "main_panel_top_space" }, { child = "hero_panel" }, { child = "hero_status_gap" }, { child = "status_panel" }, { child = "status_new_project_gap" }, { child = "new_project_header_panel" }, { child = "new_project_name_gap" }, { child = "project_name_field" }, { child = "project_name_location_gap" }, { child = "location_field" }, { child = "location_preview_gap" }, { child = "preview_panel" }, { child = "preview_bottom_fill" }, { child = "validation_panel" }, { child = "validation_actions_gap" }, { child = "actions_row" }, { child = "main_panel_bottom_space" }]

[nodes.outer_panel]
kind = "native"
type = "HorizontalBox"
control_id = "WelcomeOuterPanel"
layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ child = "recent_panel" }, { child = "main_panel" }]

[nodes.right_space]
kind = "native"
type = "Space"
layout = { width = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }

[nodes.content_row]
kind = "native"
type = "HorizontalBox"
layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ child = "left_space" }, { child = "outer_panel" }, { child = "right_space" }]

[nodes.bottom_space]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" } }

[nodes.welcome_root]
kind = "native"
type = "VerticalBox"
control_id = "WelcomeRoot"
classes = ["editor-shell", "showcase-shell"]
layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ child = "top_space" }, { child = "content_row" }, { child = "bottom_space" }]
