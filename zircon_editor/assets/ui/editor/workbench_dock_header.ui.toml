stylesheets = []

[asset]
kind = "layout"
id = "editor.workbench_dock_header"
version = 1
display_name = "workbench dock header"

[imports]
widgets = []
styles = []

[root]
node = "dock_header_root"

[nodes.dock_header_root]
kind = "native"
type = "Overlay"
control_id = "DockHeaderRoot"
layout = { clip = true, container = { kind = "Overlay" }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [
  { child = "dock_header_bar" },
  { child = "dock_subtitle" },
  { child = "dock_tab_0" },
  { child = "dock_tab_close_0" },
  { child = "dock_tab_1" },
  { child = "dock_tab_close_1" },
  { child = "dock_tab_2" },
]

[nodes.dock_header_bar]
kind = "native"
type = "Container"
control_id = "DockHeaderBar"
props = { surface_variant = "panel", radius = 0.0, border_width = 0.0 }
layout = { position = { x = 0.0, y = 0.0 }, width = { stretch = "Stretch" }, height = { min = 31.0, preferred = 31.0, max = 31.0, stretch = "Fixed" } }

[nodes.dock_subtitle]
kind = "native"
type = "Label"
control_id = "DockSubtitle"
props = { text = "", text_tone = "muted", font_size = 10.0, text_align = "right", overflow = "elide" }
layout = { anchor = { x = 1.0, y = 0.0 }, pivot = { x = 1.0, y = 0.0 }, position = { x = -12.0, y = 9.0 }, width = { min = 132.0, preferred = 132.0, max = 132.0, stretch = "Fixed" }, height = { min = 14.0, preferred = 14.0, max = 14.0, stretch = "Fixed" } }

[nodes.dock_tab_0]
kind = "native"
type = "Label"
control_id = "DockTab0"
props = { text = "Project", text_tone = "default", font_size = 11.0, text_align = "center", overflow = "elide" }
layout = { position = { x = 8.0, y = 1.0 }, width = { min = 92.0, preferred = 92.0, max = 92.0, stretch = "Fixed" }, height = { min = 30.0, preferred = 30.0, max = 30.0, stretch = "Fixed" } }

[nodes.dock_tab_close_0]
kind = "native"
type = "IconButton"
control_id = "DockTabClose0"
props = { surface_variant = "inset", icon = "close-outline", value = "ionicons/close-outline.svg", text_tone = "muted", radius = 8.0, border_width = 0.0 }
layout = { position = { x = 76.0, y = 8.0 }, width = { min = 16.0, preferred = 16.0, max = 16.0, stretch = "Fixed" }, height = { min = 16.0, preferred = 16.0, max = 16.0, stretch = "Fixed" } }

