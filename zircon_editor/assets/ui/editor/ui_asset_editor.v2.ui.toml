[asset]
kind = "view"
id = "editor.ui_asset_editor.projection.v2"
version = 2
display_name = "UI Asset Editor Projection"

[root]
node = "ui_asset_editor_root"

[imports]
styles = ["res://ui/theme/editor_material.v2.ui.toml"]

[tokens]
surface = "$material_surface_container_low"
panel = "$material_surface"
panel_inset = "$material_surface_inset"
outline = "$material_outline"
text = "$material_text"
muted = "$material_text_muted"
accent = "$material_color_primary"

[[stylesheets]]
id = "ui_asset_editor_projection_material"

[[stylesheets.rules]]
selector = ".ui-asset-shell"
[stylesheets.rules.set.self]
background_color = "$surface"
foreground_color = "$text"

[[stylesheets.rules]]
selector = ".ui-asset-panel"
[stylesheets.rules.set.self]
background_color = "$panel"
border_color = "$outline"
foreground_color = "$text"
surface_variant = "panel"
radius = 6.0
corner_radius = 6.0
border_width = 1.0

[[stylesheets.rules]]
selector = ".ui-asset-inset"
[stylesheets.rules.set.self]
background_color = "$panel_inset"
border_color = "$outline"
foreground_color = "$text"
surface_variant = "inset"
radius = 5.0
corner_radius = 5.0
border_width = 1.0

[[stylesheets.rules]]
selector = ".ui-asset-row"
[stylesheets.rules.set.self]
background_color = "$panel_inset"
border_color = "$outline"
foreground_color = "$text"
surface_variant = "row"
radius = 4.0
corner_radius = 4.0
border_width = 1.0

[[stylesheets.rules]]
selector = ".ui-asset-section"
[stylesheets.rules.set.self]
background_color = "$panel_inset"
border_color = "$outline"
foreground_color = "$text"
surface_variant = "section"
radius = 5.0
corner_radius = 5.0
border_width = 1.0

[[stylesheets.rules]]
selector = ".ui-asset-muted"
[stylesheets.rules.set.self]
foreground_color = "$muted"
font_size = 11.0

[nodes.ui_asset_editor_root]
component = "VerticalGroup"
control_id = "UiAssetEditorRoot"
classes = ["ui-asset-shell"]
layout = { container = { kind = "VerticalBox", gap = 8.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [
  { node = "header_panel" },
  { node = "body" },
]

[nodes.header_panel]
component = "VerticalGroup"
control_id = "HeaderPanel"
classes = ["ui-asset-panel"]
