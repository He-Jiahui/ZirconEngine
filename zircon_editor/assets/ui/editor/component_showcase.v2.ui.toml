[asset]
kind = "view"
id = "editor.window.ui_component_showcase.v2"
version = 2
display_name = "UI Component Showcase"

[root]
node = "component_showcase_root"

[imports]
widgets = [
  "res://ui/editor/components/showcase_command_toolbar.zui#ShowcaseCommandToolbar",
  "res://ui/editor/components/showcase_bottom_log.zui#ShowcaseBottomLog",
  "res://ui/editor/components/showcase_category_nav.zui#ShowcaseCategoryNav",
  "res://ui/editor/components/showcase_state_panel.zui#ShowcaseStatePanel",
  "res://ui/editor/components/showcase_visual_section.zui#ShowcaseVisualSection",
  "res://ui/editor/components/showcase_input_section.zui#ShowcaseInputSection",
  "res://ui/editor/components/showcase_selection_section.zui#ShowcaseSelectionSection",
  "res://ui/editor/components/showcase_collections_section.zui#ShowcaseCollectionsSection",
]
styles = ["res://ui/theme/editor_material.v2.ui.toml"]

[tokens]
surface = "#101418"
surface_panel = "#202830"
surface_inset = "#12181e"
outline = "#4b626d"
text_primary = "#e6f1f4"
text_muted = "#8fa3ac"
primary = "#35c7d0"
primary_text = "#081416"

[[stylesheets]]
id = "component_showcase_material"

[[stylesheets.rules]]
selector = ".showcase-shell"
[stylesheets.rules.set.self]
background_color = "$surface"
foreground_color = "$text_primary"

[[stylesheets.rules]]
selector = ".showcase-panel"
[stylesheets.rules.set.self]
background_color = "$surface_panel"
border_color = "$outline"
foreground_color = "$text_primary"
radius = 12.0
border_width = 1.0

[[stylesheets.rules]]
selector = ".showcase-section-title"
[stylesheets.rules.set.self]
foreground_color = "$text_primary"
font_size = 13.0
font_weight = 700

[[stylesheets.rules]]
selector = ".material-control"
[stylesheets.rules.set.self]
foreground_color = "$text_primary"
border_color = "$outline"
radius = 10.0
border_width = 1.0

[nodes.component_showcase_header]
component = "Label"
control_id = "UiComponentShowcaseHeader"
classes = ["showcase-title"]
props = { text = "Runtime UI Component Showcase" }
layout = { width = { stretch = "Stretch" }, height = { min = 36.0, preferred = 36.0, max = 36.0, stretch = "Fixed" } }

[nodes.component_showcase_nav]
component = "ShowcaseCategoryNav"
control_id = "ComponentShowcaseCategoryNav"
classes = ["showcase-panel"]
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.component_showcase_visual_section]
component = "ShowcaseVisualSection"
classes = ["showcase-panel", "material-surface"]
layout = { width = { stretch = "Stretch" } }

[nodes.component_showcase_input_section]
component = "ShowcaseInputSection"
classes = ["showcase-panel", "material-surface"]
layout = { width = { stretch = "Stretch" } }

[nodes.component_showcase_selection_section]
component = "ShowcaseSelectionSection"
classes = ["showcase-panel", "material-surface"]
layout = { width = { stretch = "Stretch" } }

[nodes.component_showcase_collections_section]
component = "ShowcaseCollectionsSection"
classes = ["showcase-panel", "material-surface"]
layout = { width = { stretch = "Stretch" } }

[nodes.component_showcase_content]
component = "ScrollableBox"
control_id = "ComponentShowcaseScroll"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "ScrollableBox", axis = "Vertical", gap = 10.0, scrollbar_visibility = "Auto" } }
children = [
  { node = "component_showcase_visual_section" },
  { node = "component_showcase_input_section" },
  { node = "component_showcase_selection_section" },
  { node = "component_showcase_collections_section" },
]

[nodes.component_showcase_state_panel]
component = "ShowcaseStatePanel"
control_id = "ComponentShowcaseStatePanel"
classes = ["showcase-panel"]
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.component_showcase_body]
component = "HorizontalBox"
control_id = "UiComponentShowcaseBody"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "HorizontalBox", gap = 10.0 } }
children = [
  { node = "component_showcase_nav", slot = { layout = { width = { min = 180.0, preferred = 180.0, max = 180.0, stretch = "Fixed" } } } },
  { node = "component_showcase_content", slot = { layout = { width = { stretch = "Stretch" } } } },
  { node = "component_showcase_state_panel", slot = { layout = { width = { min = 260.0, preferred = 260.0, max = 260.0, stretch = "Fixed" } } } },
]

[nodes.component_showcase_toolbar]
component = "ShowcaseCommandToolbar"
control_id = "ComponentShowcaseCommandToolbar"
classes = ["showcase-toolbar"]
layout = { width = { stretch = "Stretch" }, height = { min = 34.0, preferred = 34.0, max = 34.0, stretch = "Fixed" } }

[nodes.component_showcase_bottom_log]
component = "ShowcaseBottomLog"
control_id = "ComponentShowcaseBottomLog"
classes = ["showcase-bottom-log"]
layout = { width = { stretch = "Stretch" }, height = { min = 36.0, preferred = 36.0, max = 36.0, stretch = "Fixed" } }

[nodes.component_showcase_root]
component = "VerticalBox"
control_id = "UiComponentShowcaseRoot"
classes = ["showcase-shell"]
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "VerticalBox", gap = 10.0 } }
children = [
  { node = "component_showcase_header" },
  { node = "component_showcase_toolbar" },
  { node = "component_showcase_body" },
  { node = "component_showcase_bottom_log" },
]
