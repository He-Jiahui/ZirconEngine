[asset]
kind = "layout"
id = "editor.ui_asset_editor"
version = 1
display_name = "UI Asset Editor"

[imports]
widgets = [
  "res://ui/editor/editor_widgets.ui.toml#EditorToolbar",
  "res://ui/editor/editor_widgets.ui.toml#EditorToolbarButton",
  "res://ui/editor/editor_widgets.ui.toml#EditorSectionCard",
]
styles = ["res://ui/theme/editor_base.ui.toml"]

[root]
node = "editor_root"

[nodes.editor_root]
kind = "native"
type = "VerticalBox"
control_id = "UiAssetEditorRoot"
classes = ["editor-shell"]
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "VerticalBox", gap = 10.0 } }
children = [
  { child = "toolbar" },
  { child = "body" },
  { child = "footer_row" },
]

[nodes.toolbar]
kind = "reference"
component_ref = "res://ui/editor/editor_widgets.ui.toml#EditorToolbar"
control_id = "UiAssetEditorToolbar"
children = [
  { child = "save_button", mount = "actions" },
  { child = "preview_button", mount = "actions" },
]

[nodes.save_button]
kind = "reference"
component_ref = "res://ui/editor/editor_widgets.ui.toml#EditorToolbarButton"
control_id = "SaveAsset"
classes = ["toolbar-primary"]
params = { label = "Save Asset", icon = "albums-outline" }

[nodes.preview_button]
kind = "reference"
component_ref = "res://ui/editor/editor_widgets.ui.toml#EditorToolbarButton"
control_id = "PreviewAsset"
params = { label = "Preview", icon = "play-outline" }

[nodes.body]
kind = "native"
type = "HorizontalBox"
control_id = "UiAssetEditorBody"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "HorizontalBox", gap = 10.0 } }
children = [
  { child = "palette_panel", slot = { layout = { width = { min = 180.0, preferred = 220.0, max = 260.0, stretch = "Fixed" } } } },
  { child = "hierarchy_panel", slot = { layout = { width = { min = 220.0, preferred = 220.0, max = 260.0, stretch = "Fixed" } } } },
  { child = "designer_panel" },
  { child = "inspector_panel", slot = { layout = { width = { min = 260.0, preferred = 260.0, max = 320.0, stretch = "Fixed" } } } },
]

[nodes.footer_row]
kind = "native"
type = "HorizontalBox"
control_id = "UiAssetEditorFooterRow"
layout = { width = { stretch = "Stretch" }, height = { min = 180.0, preferred = 220.0, stretch = "Fixed" }, container = { kind = "HorizontalBox", gap = 10.0 } }
children = [
  { child = "source_panel" },
  { child = "stylesheet_panel" },
  { child = "preview_panel" },
]

[nodes.palette_panel]
kind = "reference"
component_ref = "res://ui/editor/editor_widgets.ui.toml#EditorSectionCard"
control_id = "PalettePanel"
params = { title = "Palette" }
children = [
  { child = "palette_label", mount = "content" },
  { child = "palette_groups_label", mount = "content" },
]

[nodes.palette_label]
kind = "native"
type = "Label"
control_id = "PaletteLabel"
props = { text = "Native Widgets, Components, References" }

[nodes.palette_groups_label]
kind = "native"
type = "Label"
control_id = "PaletteGroupsLabel"
props = { text = "Patterns, Named Slots, External Widgets" }

[nodes.hierarchy_panel]
kind = "reference"
component_ref = "res://ui/editor/editor_widgets.ui.toml#EditorSectionCard"
control_id = "HierarchyPanel"
params = { title = "Hierarchy" }
children = [
  { child = "hierarchy_label", mount = "content" },
  { child = "hierarchy_slots_label", mount = "content" },
]

[nodes.hierarchy_label]
kind = "native"
