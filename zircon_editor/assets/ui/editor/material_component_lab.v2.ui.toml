[nodes.appbar]
component = "HorizontalBox"
classes = ["material-lab-card"]
layout = { width = { stretch = "Stretch" }, height = { min = 56.0, preferred = 56.0, max = 56.0, stretch = "Fixed" }, container = { kind = "HorizontalBox", gap = 8.0 } }
children = [
  { node = "appbar_title" },
  { node = "appbar_scope" },
  { node = "appbar_count" },
  { node = "appbar_status" },
  { node = "appbar_capture" },
]

