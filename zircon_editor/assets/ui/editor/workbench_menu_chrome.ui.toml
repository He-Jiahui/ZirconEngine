stylesheets = []

[asset]
kind = "layout"
id = "editor.workbench_menu_chrome"
version = 1
display_name = "workbench menu chrome"

[imports]
widgets = []
styles = []

[root]
node = "workbench_menu_chrome_root"

[nodes.workbench_menu_chrome_root]
kind = "native"
type = "Overlay"
control_id = "WorkbenchMenuBarRoot"
layout = { clip = true, container = { kind = "Overlay" }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [
  { child = "workbench_menu_top_bar" },
  { child = "workbench_menu_separator" },
  { child = "workbench_menu_slot_0" },
  { child = "workbench_menu_slot_1" },
  { child = "workbench_menu_slot_2" },
  { child = "workbench_menu_slot_3" },
  { child = "workbench_menu_slot_4" },
  { child = "workbench_menu_slot_5" },
  { child = "workbench_menu_slot_6" },
]

[nodes.workbench_menu_top_bar]
kind = "native"
type = "Container"
control_id = "WorkbenchMenuTopBar"
props = { surface_variant = "panel", radius = 0.0, border_width = 0.0 }
layout = { position = { x = 0.0, y = 0.0 }, width = { stretch = "Stretch" }, height = { min = 24.0, preferred = 24.0, max = 24.0, stretch = "Fixed" } }

[nodes.workbench_menu_separator]
kind = "native"
type = "Container"
control_id = "WorkbenchMenuSeparator"
props = { surface_variant = "inset", radius = 0.0, border_width = 0.0 }
layout = { position = { x = 0.0, y = 24.0 }, width = { stretch = "Stretch" }, height = { min = 1.0, preferred = 1.0, max = 1.0, stretch = "Fixed" } }

