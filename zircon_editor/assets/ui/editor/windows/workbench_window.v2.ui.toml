[asset]
kind = "view"
id = "editor.window.workbench"
version = 2
display_name = "Workbench Window"

[root]
node = "root"

[nodes.root]
component = "VerticalGroup"
control_id = "WorkbenchWindowRoot"
layout = { clip = true, container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ node = "reference_frame" }]

[nodes.reference_frame]
component = "SizeBox"
control_id = "WorkbenchReferenceFrame"
layout = { clip = true, container = { kind = "SizeBox", aspect_ratio = 1.7768332 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ node = "reference_image" }]

[nodes.reference_image]
component = "Image"
control_id = "WorkbenchReferenceImage"
props = { image = "ui/editor/reference/workbench.png", value = "ui/editor/reference/workbench.png", reference_source = "docs/ui-and-layout/workbench.png", reference_width = 1672.0, reference_height = 941.0 }
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
