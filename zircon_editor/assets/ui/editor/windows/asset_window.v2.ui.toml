[asset]
kind = "view"
id = "editor.window.asset"
version = 2
display_name = "Asset Window"

[imports]
widgets = ["editor.host.activity_drawer_window#ActivityDrawerWindow"]

[root]
node = "root"

[nodes.root]
component = "ActivityDrawerWindow"
control_id = "AssetWindowRoot"
props = { shell_preset = "jetbrains_shell", panel_preset = "fyrox_panel", window_model = "unreal_window_model" }
children = [
  { node = "tree", slot = { name = "left_top_activity" } },
  { node = "collections", slot = { name = "left_bottom_activity" } },
  { node = "details", slot = { name = "right_top_activity" } },
  { node = "preview", slot = { name = "right_bottom_activity" } },
  { node = "import_log", slot = { name = "bottom_left_activity" } },
  { node = "dependency", slot = { name = "bottom_right_activity" } },
  { node = "browser", slot = { name = "content" } },
]

[nodes.tree]
component = "Container"
control_id = "AssetWindowTreeActivity"
layout = { clip = true, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.collections]
component = "Container"
control_id = "AssetWindowCollectionsActivity"
layout = { clip = true, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.details]
component = "Container"
control_id = "AssetWindowDetailsActivity"
layout = { clip = true, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.preview]
component = "Container"
control_id = "AssetWindowPreviewActivity"
layout = { clip = true, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.import_log]
component = "Container"
control_id = "AssetWindowImportLogActivity"
layout = { clip = true, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.dependency]
component = "Container"
control_id = "AssetWindowDependencyActivity"
layout = { clip = true, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.browser]
component = "Container"
control_id = "AssetWindowBrowserContent"
layout = { clip = true, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
