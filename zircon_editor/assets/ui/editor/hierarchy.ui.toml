stylesheets = []

[asset]
kind = "layout"
id = "editor.hierarchy"
version = 1
display_name = "Hierarchy"

[imports]
styles = ["res://ui/theme/editor_base.ui.toml"]

[root]
node = "hierarchy_root"

[nodes.top_space]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 8.0, preferred = 8.0, max = 8.0, stretch = "Fixed" } }

[nodes.left_space]
kind = "native"
type = "Space"
layout = { width = { min = 8.0, preferred = 8.0, max = 8.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }

[nodes.list_panel]
kind = "native"
type = "Space"
control_id = "HierarchyListPanel"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.right_space]
kind = "native"
type = "Space"
layout = { width = { min = 8.0, preferred = 8.0, max = 8.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }

[nodes.content_row]
kind = "native"
type = "HorizontalBox"
layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ child = "left_space" }, { child = "list_panel" }, { child = "right_space" }]

[nodes.bottom_space]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 8.0, preferred = 8.0, max = 8.0, stretch = "Fixed" } }

[nodes.hierarchy_root]
kind = "native"
type = "VerticalBox"
control_id = "HierarchyRoot"
classes = ["editor-shell"]
layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ child = "top_space" }, { child = "content_row" }, { child = "bottom_space" }]
