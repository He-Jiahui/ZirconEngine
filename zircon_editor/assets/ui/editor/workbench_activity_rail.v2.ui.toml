stylesheets = []

[asset]
kind = "view"
id = "editor.workbench_activity_rail.v2"
version = 2
display_name = "workbench activity rail"

[imports]
widgets = []
styles = ["res://ui/theme/editor_base.v2.ui.toml"]

[root]
node = "activity_rail_root"

[nodes.activity_rail_root]
component = "Overlay"
control_id = "ActivityRailRoot"
classes = ["activity-rail", "editor-shell"]
layout = { clip = true, container = { kind = "Overlay" }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [
  { node = "activity_rail_panel" },
  { node = "activity_rail_button_0" },
  { node = "activity_rail_button_icon_0" },
  { node = "activity_rail_button_1" },
  { node = "activity_rail_button_icon_1" },
]

[nodes.activity_rail_panel]
component = "Container"
control_id = "ActivityRailPanel"
props = { surface_variant = "panel", radius = 0.0, border_width = 0.0 }
layout = { position = { x = 0.0, y = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.activity_rail_button_0]
component = "Container"
control_id = "ActivityRailButton0"
props = { radius = 3.0, border_width = 0.0 }
layout = { position = { x = 6.0, y = 6.0 }, width = { min = 32.0, preferred = 32.0, max = 32.0, stretch = "Fixed" }, height = { min = 32.0, preferred = 32.0, max = 32.0, stretch = "Fixed" } }

[nodes.activity_rail_button_icon_0]
component = "Icon"
control_id = "ActivityRailButtonIcon0"
props = { icon = "albums-outline", value = "ionicons/albums-outline.svg", text_tone = "muted" }
layout = { position = { x = 13.0, y = 13.0 }, width = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" }, height = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" } }

[nodes.activity_rail_button_1]
component = "Container"
control_id = "ActivityRailButton1"
props = { radius = 3.0, border_width = 0.0 }
layout = { position = { x = 6.0, y = 42.0 }, width = { min = 32.0, preferred = 32.0, max = 32.0, stretch = "Fixed" }, height = { min = 32.0, preferred = 32.0, max = 32.0, stretch = "Fixed" } }

[nodes.activity_rail_button_icon_1]
component = "Icon"
control_id = "ActivityRailButtonIcon1"
props = { icon = "layers-outline", value = "ionicons/layers-outline.svg", text_tone = "muted" }
layout = { position = { x = 13.0, y = 49.0 }, width = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" }, height = { min = 18.0, preferred = 18.0, max = 18.0, stretch = "Fixed" } }
