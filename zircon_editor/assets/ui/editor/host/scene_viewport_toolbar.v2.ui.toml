events = [{ id = "ViewportToolbar/SetRotateSnapDegrees", event = "Change", route = "ViewportCommand.SetRotateSnapDegrees" }]

[nodes.set_scale_snap]
component = "IconButton"
control_id = "SetScaleSnap"
props = { label = "Scale", icon = "expand-outline" }
layout = { width = { min = 62.0, preferred = 62.0, max = 62.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }
