stylesheets = []

[asset]
kind = "layout"
id = "editor.inspector"
version = 1
display_name = "Inspector"

[imports]
styles = ["res://ui/theme/editor_base.ui.toml"]

[root]
node = "inspector_root"

[nodes.top_space]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 10.0, preferred = 10.0, max = 10.0, stretch = "Fixed" } }

[nodes.left_space]
kind = "native"
type = "Space"
layout = { width = { min = 10.0, preferred = 10.0, max = 10.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }

[nodes.header_panel]
kind = "native"
type = "Space"
control_id = "InspectorHeaderPanel"
layout = { width = { stretch = "Stretch" }, height = { min = 22.0, preferred = 22.0, max = 22.0, stretch = "Fixed" } }

[nodes.header_name_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 4.0, preferred = 4.0, max = 4.0, stretch = "Fixed" } }

[nodes.name_row]
kind = "native"
type = "Space"
control_id = "InspectorNameRow"
layout = { width = { stretch = "Stretch" }, height = { min = 22.0, preferred = 22.0, max = 22.0, stretch = "Fixed" } }

[nodes.name_parent_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 4.0, preferred = 4.0, max = 4.0, stretch = "Fixed" } }

[nodes.parent_row]
kind = "native"
type = "Space"
control_id = "InspectorParentRow"
layout = { width = { stretch = "Stretch" }, height = { min = 22.0, preferred = 22.0, max = 22.0, stretch = "Fixed" } }

[nodes.parent_position_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 4.0, preferred = 4.0, max = 4.0, stretch = "Fixed" } }

[nodes.position_row]
kind = "native"
type = "Space"
control_id = "InspectorPositionRow"
layout = { width = { stretch = "Stretch" }, height = { min = 22.0, preferred = 22.0, max = 22.0, stretch = "Fixed" } }

[nodes.position_separator_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 4.0, preferred = 4.0, max = 4.0, stretch = "Fixed" } }

[nodes.separator_row]
kind = "native"
type = "Space"
control_id = "InspectorSeparatorRow"
layout = { width = { stretch = "Stretch" }, height = { min = 1.0, preferred = 1.0, max = 1.0, stretch = "Fixed" } }

[nodes.separator_actions_gap]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 4.0, preferred = 4.0, max = 4.0, stretch = "Fixed" } }

[nodes.actions_row]
kind = "native"
type = "Space"
control_id = "InspectorActionsRow"
layout = { width = { stretch = "Stretch" }, height = { min = 24.0, preferred = 24.0, max = 24.0, stretch = "Fixed" } }

[nodes.bottom_fill]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.content_panel]
kind = "native"
type = "VerticalBox"
control_id = "InspectorContentPanel"
layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ child = "header_panel" }, { child = "header_name_gap" }, { child = "name_row" }, { child = "name_parent_gap" }, { child = "parent_row" }, { child = "parent_position_gap" }, { child = "position_row" }, { child = "position_separator_gap" }, { child = "separator_row" }, { child = "separator_actions_gap" }, { child = "actions_row" }, { child = "bottom_fill" }]

[nodes.right_space]
kind = "native"
type = "Space"
layout = { width = { min = 10.0, preferred = 10.0, max = 10.0, stretch = "Fixed" }, height = { stretch = "Stretch" } }

[nodes.content_row]
kind = "native"
type = "HorizontalBox"
layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ child = "left_space" }, { child = "content_panel" }, { child = "right_space" }]

[nodes.bottom_space]
kind = "native"
type = "Space"
layout = { width = { stretch = "Stretch" }, height = { min = 10.0, preferred = 10.0, max = 10.0, stretch = "Fixed" } }

[nodes.inspector_root]
kind = "native"
type = "VerticalBox"
control_id = "InspectorRoot"
classes = ["editor-shell"]
layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [{ child = "top_space" }, { child = "content_row" }, { child = "bottom_space" }]
