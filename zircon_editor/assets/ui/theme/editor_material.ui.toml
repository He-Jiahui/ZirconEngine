[[stylesheets.rules]]
selector = ".material-runtime-hud"
set = { self = { background = { color = "$material_surface_inset" }, foreground = { color = "$material_text" }, border = { color = "$material_border", width = "$material_border_width", radius = "$material_radius_surface" } } }

[[stylesheets.rules]]
selector = ".material-runtime-backdrop"
set = { self = { background = { color = "$material_color_scrim" } } }

[[stylesheets.rules]]
selector = ".material-title"
set = { self = { foreground = { color = "$material_text" }, font = { size = "$material_font_size_title" } } }

[[stylesheets.rules]]
selector = ".material-body"
set = { self = { foreground = { color = "$material_text" }, font = { size = "$material_font_size_body" } } }

[[stylesheets.rules]]
selector = ".material-meta"
set = { self = { foreground = { color = "$material_text_muted" }, font = { size = "$material_font_size_meta" } } }
