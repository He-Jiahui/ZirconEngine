[asset]
kind = "style"
id = "ui.theme.editor_material"
version = 2
display_name = "Editor Material"

[imports]
widgets = []
styles = []

[tokens]
accent = "#35c7d0"
panel_bg = "#202830"
panel_bg_soft = "#2f4650"
field_bg = "#12181e"
border = "#4b626d"
text = "#e6f1f4"
muted = "#8fa3ac"
warning = "#f2b84b"
error = "#ef7066"
material_surface = "#202830"
material_surface_inset = "#12181e"
material_surface_hover = "#2f4650"
material_surface_pressed = "#103c4a"
material_surface_selected = "#0f6574"
material_surface_disabled = "#191d22"
material_accent = "#35c7d0"
material_accent_soft = "#0f6574"
material_border = "#4b626d"
material_text = "#e6f1f4"
material_text_muted = "#8fa3ac"
material_text_disabled = "#58656c"
material_warning = "#f2b84b"
material_error = "#ef7066"
material_success = "#5cbe7a"
material_info = "#63b3ff"
material_warning_container = "#463112"
material_error_container = "#4c2427"
material_success_container = "#1d472f"
material_info_container = "#18395b"
material_popup = "#0e1217"
material_track = "#2a343c"
material_focus_ring = "#80eaff"
material_primary = "#35c7d0"
material_on_primary = "#081416"
material_surface_container = "#202830"
material_surface_container_low = "#161e25"
material_surface_container_high = "#2f4650"
material_outline = "#4b626d"
material_outline_variant = "#334852"
material_on_error = "#fff0ee"
material_on_success = "#07140c"
material_on_info = "#07101a"
material_shadow = "#00000066"
material_shadow_soft = "#00000033"
material_scrim = "#0b1020cc"
material_inverse_surface = "#d2dceb"
material_inverse_on_surface = "#171a20"
material_color_primary = "$material_primary"
material_color_on_primary = "$material_on_primary"
material_color_surface = "$material_surface"
material_color_surface_container = "$material_surface_container"
material_color_surface_container_low = "$material_surface_container_low"
material_color_surface_container_high = "$material_surface_container_high"
material_color_on_surface = "$material_text"
material_color_on_surface_variant = "$material_text_muted"
material_color_outline = "$material_outline"
material_color_outline_variant = "$material_outline_variant"
material_color_error = "$material_error"
material_color_on_error = "$material_on_error"
material_color_success = "$material_success"
material_color_on_success = "$material_on_success"
material_color_info = "$material_info"
material_color_on_info = "$material_on_info"
material_color_shadow = "$material_shadow"
material_color_scrim = "$material_scrim"
material_state_layer_opacity_hover = 0.12
material_state_layer_opacity_focus = 0.18
material_state_layer_opacity_pressed = 0.16
material_state_layer_opacity_disabled = 0.38
material_state_layer_opacity_dragged = 0.20
material_state_layer_opacity_press = "$material_state_layer_opacity_pressed"
material_state_layer_opacity_drag = "$material_state_layer_opacity_dragged"
material_disabled_opacity = 0.38
material_focus_ring_width = 2.0
material_focus_ring_offset = 1.0
material_elevation_level0 = 0.0
material_elevation_level1 = 1.0
material_elevation_level2 = 3.0
material_radius_none = 0.0
material_radius_control = 10.0
material_radius_surface = 12.0
material_radius_small = 8.0
material_radius_medium = 12.0
material_radius_large = 18.0
material_radius_pill = 999.0
material_border_width = 1.0
material_border_width_none = 0.0
material_density_compact_height = 32.0
material_density_default_height = 40.0
material_density_prominent_height = 56.0
material_density_compact_control_height = "$material_density_compact_height"
material_density_default_control_height = "$material_density_default_height"
material_density_field_control_height = "$material_density_prominent_height"
material_density_list_item_height = "$material_density_default_height"
material_spacing_button_content_x = 12.0
material_spacing_button_content_y = 6.0
material_spacing_button_gap = 6.0
material_spacing_field_content_x = 10.0
material_spacing_field_content_y = 4.0
material_spacing_list_item_content_x = 10.0
material_spacing_list_item_gap = 6.0
material_icon_size_button = 16.0
material_icon_size_standard = 18.0
material_font_size_body = 12.0
material_font_size_meta = 11.0
material_font_size_title = 15.0

[[stylesheets]]
id = "editor_material"

[[stylesheets.rules]]
selector = ".showcase-shell"
set = { self = { background = { color = "$field_bg" } } }

[[stylesheets.rules]]
selector = ".showcase-panel"
set = { self = { background = { color = "$panel_bg" }, border = { color = "$border", width = "$material_border_width", radius = "$material_radius_surface" } } }

[[stylesheets.rules]]
selector = ".showcase-field"
set = { self = { background = { color = "$panel_bg_soft" }, border = { color = "$border", width = "$material_border_width", radius = "$material_radius_small" } } }

[[stylesheets.rules]]
selector = ".showcase-title"
set = { self = { foreground = { color = "$text" }, font = { size = "$material_font_size_title" } } }

[[stylesheets.rules]]
selector = ".showcase-muted"
set = { self = { foreground = { color = "$muted" }, font = { size = "$material_font_size_meta" } } }

[[stylesheets.rules]]
selector = ".material-state-layer"
set = { self = { background = { color = "$material_surface_inset" }, border = { color = "$material_border", width = "$material_border_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control"
set = { self = { background = { color = "$material_surface" }, foreground = { color = "$material_text" }, border = { color = "$material_border", width = "$material_border_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control:hover"
set = { self = { background = { color = "$material_surface_hover" }, border = { color = "$material_accent", width = "$material_border_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control:pressed"
set = { self = { background = { color = "$material_surface_pressed" }, border = { color = "$material_focus_ring", width = "$material_focus_ring_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control:focus"
set = { self = { background = { color = "$material_surface_hover" }, border = { color = "$material_focus_ring", width = "$material_focus_ring_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control:selected"
set = { self = { background = { color = "$material_surface_selected" }, border = { color = "$material_focus_ring", width = "$material_focus_ring_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control:disabled"
set = { self = { background = { color = "$material_surface_disabled" }, foreground = { color = "$material_text_disabled" }, border = { color = "$material_outline_variant", width = "$material_border_width", radius = "$material_radius_control" }, opacity = "$material_disabled_opacity" } }

[[stylesheets.rules]]
selector = ".material-surface-success"
set = { self = { background = { color = "$material_success_container" }, foreground = { color = "$material_success" }, border = { color = "$material_success", width = "$material_border_width", radius = "$material_radius_control" } } }

