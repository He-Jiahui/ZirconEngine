[[stylesheets]]
id = "editor_material"

[[stylesheets.rules]]
selector = ".showcase-shell"
set = { self = { background = { color = "$field_bg" } } }

[[stylesheets.rules]]
selector = ".showcase-panel"
set = { self = { background = { color = "$panel_bg" }, border = { color = "$border", width = "$material_border_width", radius = "$material_radius_surface" } } }

[[stylesheets.rules]]
selector = ".showcase-field"
set = { self = { background = { color = "$panel_bg_soft" }, border = { color = "$border", width = "$material_border_width", radius = "$material_radius_small" } } }

[[stylesheets.rules]]
selector = ".showcase-title"
set = { self = { foreground = { color = "$text" }, font = { size = "$material_font_size_title" } } }

[[stylesheets.rules]]
selector = ".showcase-muted"
set = { self = { foreground = { color = "$muted" }, font = { size = "$material_font_size_meta" } } }

[[stylesheets.rules]]
selector = ".material-state-layer"
set = { self = { background = { color = "$material_surface_inset" }, border = { color = "$material_border", width = "$material_border_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control"
set = { self = { background = { color = "$material_surface" }, foreground = { color = "$material_text" }, border = { color = "$material_border", width = "$material_border_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control:hover"
set = { self = { background = { color = "$material_surface_hover" }, border = { color = "$material_accent", width = "$material_border_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control:pressed"
set = { self = { background = { color = "$material_surface_pressed" }, border = { color = "$material_focus_ring", width = "$material_focus_ring_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control:focus"
set = { self = { border = { color = "$material_focus_ring", width = "$material_focus_ring_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control:selected"
set = { self = { background = { color = "$material_surface_selected" }, border = { color = "$material_focus_ring", width = "$material_focus_ring_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-control:disabled"
set = { self = { background = { color = "$material_surface_disabled" }, foreground = { color = "$material_text_disabled" }, border = { color = "$material_outline_variant", width = "$material_border_width", radius = "$material_radius_control" }, opacity = "$material_disabled_opacity" } }

[[stylesheets.rules]]
selector = ".material-surface-success"
set = { self = { background = { color = "$material_success_container" }, foreground = { color = "$material_success" }, border = { color = "$material_success", width = "$material_border_width", radius = "$material_radius_control" } } }

[[stylesheets.rules]]
selector = ".material-surface-info"
set = { self = { background = { color = "$material_info_container" }, foreground = { color = "$material_info" }, border = { color = "$material_info", width = "$material_border_width", radius = "$material_radius_control" } } }

