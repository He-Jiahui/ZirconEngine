[asset]
kind = "layout"
id = "runtime.quest_log_dialog"
version = 1
display_name = "Quest Log Dialog"

[root]
node = "quest_log_dialog_root"

[nodes.quest_log_dialog_root]
kind = "native"
type = "Overlay"
control_id = "QuestLogDialogRoot"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "Overlay" } }
children = [
  { child = "backdrop" },
  { child = "dialog_panel" },
]

[nodes.backdrop]
kind = "native"
type = "Label"
control_id = "QuestLogBackdrop"
classes = ["dialog-backdrop"]
props = { text = "" }

[nodes.dialog_panel]
kind = "native"
type = "VerticalBox"
control_id = "QuestLogPanel"
classes = ["dialog-panel"]
layout = { width = { min = 460.0, preferred = 580.0, max = 720.0, stretch = "Fixed" }, height = { min = 380.0, preferred = 480.0, max = 620.0, stretch = "Fixed" }, container = { kind = "VerticalBox", gap = 10.0 } }
children = [
  { child = "title_label" },
  { child = "quest_rows" },
  { child = "actions_row" },
]

[nodes.title_label]
kind = "native"
type = "Label"
control_id = "QuestLogTitle"
classes = ["dialog-title"]
props = { text = "Quest Log" }

[nodes.quest_rows]
kind = "native"
type = "VerticalBox"
control_id = "QuestRows"
classes = ["dialog-body"]
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "VerticalBox", gap = 8.0 } }
children = [
  { child = "quest_primary" },
  { child = "quest_secondary" },
]

[nodes.quest_primary]
kind = "native"
type = "Label"
control_id = "QuestPrimary"
classes = ["dialog-body"]
props = { text = "Signal From The Ridge  •  Reach the relay tower before nightfall" }

[nodes.quest_secondary]
kind = "native"
type = "Label"
control_id = "QuestSecondary"
classes = ["dialog-meta"]
props = { text = "Workshop Repairs  •  Collect 3 composite plates" }

[nodes.actions_row]
kind = "native"
type = "HorizontalBox"
control_id = "QuestLogActions"
layout = { width = { stretch = "Stretch" }, container = { kind = "HorizontalBox", gap = 10.0 } }
children = [
  { child = "track_button" },
  { child = "close_button" },
]

[nodes.track_button]
kind = "native"
type = "Button"
control_id = "TrackQuest"
classes = ["dialog-button", "dialog-button-primary"]
props = { text = "Track" }

[nodes.close_button]
kind = "native"
type = "Button"
control_id = "CloseQuestLog"
classes = ["dialog-button"]
props = { text = "Close" }

[[stylesheets]]
id = "quest_log_dialog"

[[stylesheets.rules]]
selector = ".dialog-backdrop"
set = { self = { background = { color = "#0b1020" } } }

[[stylesheets.rules]]
selector = ".dialog-panel"
set = { self = { background = { color = "#182132" } } }

[[stylesheets.rules]]
selector = ".dialog-title"
set = { self = { text = "#f4f7ff" } }

[[stylesheets.rules]]
selector = ".dialog-meta"
set = { self = { text = "#95a8c9" } }

[[stylesheets.rules]]
selector = ".dialog-body"
set = { self = { text = "#d7e0f2" } }

[[stylesheets.rules]]
selector = "Button.dialog-button"
set = { self = { background = { color = "#24324b" }, text = "#e1e9f7" } }

[[stylesheets.rules]]
selector = "Button.dialog-button-primary"
set = { self = { background = { color = "#2f5fb8" } } }
