[asset]
kind = "layout"
id = "runtime.sample_hud"
version = 1
display_name = "Runtime HUD"

[imports]
widgets = []
styles = ["res://ui/theme/editor_material.ui.toml"]

[tokens]

[root]
node_id = "hud_root"
kind = "native"
type = "VerticalBox"
control_id = "RuntimeHudRoot"
classes = ["hud-root", "material-runtime-hud"]
bindings = []

[root.params]

[root.props]

[root.layout.container]
gap = 8.0
kind = "VerticalBox"

[root.layout.height]
stretch = "Stretch"

[root.layout.width]
stretch = "Stretch"

[root.style_overrides.self]

[root.style_overrides.slot]

[[root.children]]

[root.children.slot]

[root.children.node]
node_id = "status_row"
kind = "native"
type = "HorizontalBox"
control_id = "HudStatusRow"
classes = ["hud-row"]
bindings = []

[root.children.node.params]

[root.children.node.props]

[root.children.node.layout.container]
gap = 12.0
kind = "HorizontalBox"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.style_overrides.self]

[root.children.node.style_overrides.slot]

[[root.children.node.children]]

[root.children.node.children.slot]

[root.children.node.children.node]
node_id = "mission_label"
kind = "native"
type = "Label"
control_id = "MissionStatus"
classes = ["hud-title", "material-title"]
bindings = []
children = []

[root.children.node.children.node.params]

[root.children.node.children.node.props]
text = "Mission: Relay Tower"

[root.children.node.children.node.style_overrides.self]

[root.children.node.children.node.style_overrides.slot]

[[root.children.node.children]]

[root.children.node.children.slot]

[root.children.node.children.node]
node_id = "ammo_label"
kind = "native"
type = "Label"
control_id = "AmmoStatus"
classes = ["hud-meta", "material-meta"]
bindings = []
children = []

[root.children.node.children.node.params]

[root.children.node.children.node.props]
text = "Ammo 42 / 90"

[root.children.node.children.node.style_overrides.self]

[root.children.node.children.node.style_overrides.slot]

[[root.children]]

[root.children.slot]

[root.children.node]
node_id = "score_panel"
kind = "native"
type = "Label"
control_id = "ScoreLabel"
classes = ["hud-score", "material-body"]
bindings = []
children = []

[root.children.node.params]

[root.children.node.props]
text = "Score 12850"

[root.children.node.style_overrides.self]

[root.children.node.style_overrides.slot]

[[root.children]]

[root.children.slot]

[root.children.node]
node_id = "actions_row"
kind = "native"
type = "HorizontalBox"
control_id = "HudActionsRow"
classes = ["hud-row"]
bindings = []

[root.children.node.params]

[root.children.node.props]

[root.children.node.layout.container]
gap = 10.0
kind = "HorizontalBox"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.style_overrides.self]

[root.children.node.style_overrides.slot]

[[root.children.node.children]]

[root.children.node.children.slot]

[root.children.node.children.node]
node_id = "use_button"
kind = "native"
type = "Button"
control_id = "UseAction"
classes = [
    "material-control",
    "material-button",
    "material-button-primary",
    "hud-button",
    "hud-button-primary",
]
bindings = []
children = []

[root.children.node.children.node.params]

[root.children.node.children.node.props]
text = "Use"
font_size = 12.0
surface_variant = "accent"
button_variant = "primary"
border_width = 1.0
corner_radius = 5.0
layout_padding_left = 24.0
layout_padding_right = 24.0
layout_padding_top = 10.0
layout_padding_bottom = 10.0
layout_spacing = 8.0
layout_min_width = 40.0
layout_min_height = 40.0
layout_icon_size = 18.0

[root.children.node.children.node.style_overrides.self]

[root.children.node.children.node.style_overrides.slot]

[[root.children.node.children]]

[root.children.node.children.slot]

[root.children.node.children.node]
node_id = "inventory_button"
kind = "native"
type = "Button"
control_id = "InventoryAction"
classes = ["material-control", "material-button", "hud-button"]
bindings = []
children = []

[root.children.node.children.node.params]

[root.children.node.children.node.props]
text = "Inventory"
font_size = 12.0
surface_variant = "inset"
border_width = 1.0
corner_radius = 5.0
layout_padding_left = 24.0
layout_padding_right = 24.0
layout_padding_top = 10.0
layout_padding_bottom = 10.0
layout_spacing = 8.0
layout_min_width = 40.0
layout_min_height = 40.0
layout_icon_size = 18.0

[root.children.node.children.node.style_overrides.self]

[root.children.node.children.node.style_overrides.slot]

[components]

[[stylesheets]]
id = "runtime_hud"

[[stylesheets.rules]]
selector = ".hud-root"

[stylesheets.rules.set.self.background]
color = "$material_surface_inset"

[stylesheets.rules.set.slot]

[[stylesheets.rules]]
selector = ".hud-title"

[stylesheets.rules.set.self]
foreground = "$material_text"

[stylesheets.rules.set.slot]

[[stylesheets.rules]]
selector = ".hud-meta"

[stylesheets.rules.set.self]
foreground = "$material_text_muted"

[stylesheets.rules.set.slot]

[[stylesheets.rules]]
selector = ".hud-score"

[stylesheets.rules.set.self]
foreground = "$material_focus_ring"

[stylesheets.rules.set.slot]

[[stylesheets.rules]]
selector = "Button.hud-button"

[stylesheets.rules.set.self]
foreground = "$material_text"

[stylesheets.rules.set.self.background]
color = "$material_surface_inset"

[stylesheets.rules.set.slot]

[[stylesheets.rules]]
selector = "Button.hud-button-primary"

[stylesheets.rules.set.self.background]
color = "$material_accent"

[stylesheets.rules.set.slot]
