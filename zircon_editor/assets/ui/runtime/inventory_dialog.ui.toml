[asset]
kind = "layout"
id = "runtime.inventory_dialog"
version = 1
display_name = "Inventory Dialog"

[root]
node = "inventory_dialog_root"

[nodes.inventory_dialog_root]
kind = "native"
type = "Overlay"
control_id = "InventoryDialogRoot"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "Overlay" } }
children = [
  { child = "backdrop" },
  { child = "dialog_panel" },
]

[nodes.backdrop]
kind = "native"
type = "Label"
control_id = "InventoryBackdrop"
classes = ["dialog-backdrop"]
props = { text = "" }

[nodes.dialog_panel]
kind = "native"
type = "VerticalBox"
control_id = "InventoryDialogPanel"
classes = ["dialog-panel"]
layout = { width = { min = 420.0, preferred = 520.0, max = 640.0, stretch = "Fixed" }, height = { min = 360.0, preferred = 420.0, max = 520.0, stretch = "Fixed" }, container = { kind = "VerticalBox", gap = 10.0 } }
children = [
  { child = "title_label" },
  { child = "inventory_row" },
  { child = "actions_row" },
]

[nodes.title_label]
kind = "native"
type = "Label"
control_id = "InventoryTitle"
classes = ["dialog-title"]
props = { text = "Inventory" }

[nodes.inventory_row]
kind = "native"
type = "HorizontalBox"
control_id = "InventoryRow"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "HorizontalBox", gap = 10.0 } }
children = [
  { child = "categories_label", slot = { layout = { width = { min = 140.0, preferred = 160.0, max = 200.0, stretch = "Fixed" } } } },
  { child = "items_label" },
]

[nodes.categories_label]
kind = "native"
type = "Label"
control_id = "InventoryCategories"
classes = ["dialog-meta"]
props = { text = "Weapons\nArmor\nConsumables" }

[nodes.items_label]
kind = "native"
type = "Label"
control_id = "InventoryItems"
classes = ["dialog-body"]
props = { text = "Pulse Rifle\nRepair Kit\nField Beacon" }

[nodes.actions_row]
kind = "native"
type = "HorizontalBox"
control_id = "InventoryActions"
layout = { width = { stretch = "Stretch" }, container = { kind = "HorizontalBox", gap = 10.0 } }
children = [
  { child = "equip_button" },
  { child = "close_button" },
]

[nodes.equip_button]
kind = "native"
type = "Button"
control_id = "EquipItem"
classes = ["dialog-button", "dialog-button-primary"]
props = { text = "Equip" }

[nodes.close_button]
kind = "native"
type = "Button"
control_id = "CloseInventory"
classes = ["dialog-button"]
props = { text = "Close" }

[[stylesheets]]
id = "inventory_dialog"

[[stylesheets.rules]]
selector = ".dialog-backdrop"
set = { self = { background = { color = "#0b1020" } } }

[[stylesheets.rules]]
selector = ".dialog-panel"
set = { self = { background = { color = "#182132" } } }

[[stylesheets.rules]]
selector = ".dialog-title"
set = { self = { text = "#f4f7ff" } }

[[stylesheets.rules]]
selector = ".dialog-meta"
set = { self = { text = "#95a8c9" } }

[[stylesheets.rules]]
selector = ".dialog-body"
set = { self = { text = "#d7e0f2" } }

[[stylesheets.rules]]
selector = "Button.dialog-button"
set = { self = { background = { color = "#24324b" }, text = "#e1e9f7" } }

[[stylesheets.rules]]
selector = "Button.dialog-button-primary"
set = { self = { background = { color = "#2f5fb8" } } }
