[asset]
kind = "layout"
id = "runtime.pause_dialog"
version = 1
display_name = "Pause Dialog"

[imports]
widgets = []
styles = ["res://ui/theme/editor_material.ui.toml"]

[tokens]

[root]
node_id = "pause_dialog_root"
kind = "native"
type = "Overlay"
control_id = "PauseDialogRoot"
classes = ["dialog-root", "material-runtime-dialog"]
bindings = []

[root.params]

[root.props]

[root.layout.container]
kind = "Overlay"

[root.layout.height]
stretch = "Stretch"

[root.layout.width]
stretch = "Stretch"

[root.style_overrides.self]

[root.style_overrides.slot]

[[root.children]]

[root.children.slot]

[root.children.node]
node_id = "backdrop"
kind = "native"
type = "Canvas"
control_id = "PauseBackdrop"
classes = ["dialog-backdrop", "material-runtime-backdrop"]
bindings = []
children = []

[root.children.node.params]

[root.children.node.props]

[root.children.node.layout.height]
stretch = "Stretch"

[root.children.node.layout.width]
stretch = "Stretch"

[root.children.node.style_overrides.self]

[root.children.node.style_overrides.slot]

[[root.children]]

[root.children.slot.layout]
z_index = 10

[root.children.slot.layout.anchor]
x = 0.5
y = 0.5

[root.children.slot.layout.pivot]
x = 0.5
y = 0.5

[root.children.slot.layout.position]
x = 0.0
y = 0.0

[root.children.node]
node_id = "dialog"
kind = "native"
type = "VerticalBox"
control_id = "PauseDialogCard"
classes = ["dialog-card", "material-runtime-dialog"]
bindings = []

[root.children.node.params]

[root.children.node.props]

[root.children.node.layout.container]
gap = 12.0
kind = "VerticalBox"

[root.children.node.layout.width]
max = 420.0
min = 320.0
preferred = 360.0
stretch = "Fixed"

[root.children.node.style_overrides.self]

[root.children.node.style_overrides.slot]

[[root.children.node.children]]

[root.children.node.children.slot]

[root.children.node.children.node]
node_id = "title"
kind = "native"
type = "Label"
control_id = "PauseTitle"
classes = ["dialog-title", "material-title"]
bindings = []
children = []

[root.children.node.children.node.params]

[root.children.node.children.node.props]
text = "Paused"

[root.children.node.children.node.style_overrides.self]

[root.children.node.children.node.style_overrides.slot]

[[root.children.node.children]]

[root.children.node.children.slot]

[root.children.node.children.node]
node_id = "message"
kind = "native"
type = "Label"
control_id = "PauseMessage"
classes = ["dialog-message", "material-body"]
bindings = []
children = []

[root.children.node.children.node.params]

[root.children.node.children.node.props]
text = "Resume the mission or return to the command room."

[root.children.node.children.node.style_overrides.self]

[root.children.node.children.node.style_overrides.slot]

[[root.children.node.children]]

[root.children.node.children.slot]

[root.children.node.children.node]
node_id = "actions"
kind = "native"
type = "HorizontalBox"
control_id = "PauseActions"
classes = []
bindings = []

[root.children.node.children.node.params]

[root.children.node.children.node.props]

[root.children.node.children.node.layout.container]
gap = 10.0
kind = "HorizontalBox"

[root.children.node.children.node.layout.width]
stretch = "Stretch"

[root.children.node.children.node.style_overrides.self]

[root.children.node.children.node.style_overrides.slot]

[[root.children.node.children.node.children]]

[root.children.node.children.node.children.slot]

[root.children.node.children.node.children.node]
node_id = "resume_button"
kind = "native"
type = "Button"
control_id = "ResumeAction"
classes = [
    "material-control",
    "material-button",
    "material-button-primary",
    "dialog-button",
    "dialog-button-primary",
]
bindings = []
children = []

[root.children.node.children.node.children.node.params]

[root.children.node.children.node.children.node.props]
text = "Resume"
font_size = 12.0
surface_variant = "accent"
button_variant = "primary"
border_width = 1.0
corner_radius = 5.0
layout_padding_left = 24.0
layout_padding_right = 24.0
layout_padding_top = 10.0
layout_padding_bottom = 10.0
layout_spacing = 8.0
layout_min_width = 40.0
layout_min_height = 40.0
layout_icon_size = 18.0

[root.children.node.children.node.children.node.style_overrides.self]

[root.children.node.children.node.children.node.style_overrides.slot]

[[root.children.node.children.node.children]]

[root.children.node.children.node.children.slot]

[root.children.node.children.node.children.node]
node_id = "quit_button"
kind = "native"
type = "Button"
control_id = "QuitAction"
classes = ["material-control", "material-button", "dialog-button"]
bindings = []
children = []

[root.children.node.children.node.children.node.params]

[root.children.node.children.node.children.node.props]
text = "Quit To Menu"
font_size = 12.0
surface_variant = "inset"
border_width = 1.0
corner_radius = 5.0
layout_padding_left = 24.0
layout_padding_right = 24.0
layout_padding_top = 10.0
layout_padding_bottom = 10.0
layout_spacing = 8.0
layout_min_width = 40.0
layout_min_height = 40.0
layout_icon_size = 18.0

[root.children.node.children.node.children.node.style_overrides.self]

[root.children.node.children.node.children.node.style_overrides.slot]

[components]

[[stylesheets]]
id = "pause_dialog"

[[stylesheets.rules]]
selector = ".dialog-backdrop"

[stylesheets.rules.set.self.background]
color = "#111621cc"

[stylesheets.rules.set.slot]

[[stylesheets.rules]]
selector = ".dialog-card"

[stylesheets.rules.set.self.background]
color = "$material_popup"

[stylesheets.rules.set.slot]

[[stylesheets.rules]]
selector = ".dialog-title"

[stylesheets.rules.set.self]
foreground = "$material_text"

[stylesheets.rules.set.slot]

[[stylesheets.rules]]
selector = ".dialog-message"

[stylesheets.rules.set.self]
foreground = "$material_text_muted"

[stylesheets.rules.set.slot]

[[stylesheets.rules]]
selector = "Button.dialog-button"

[stylesheets.rules.set.self]
foreground = "$material_text"

[stylesheets.rules.set.self.background]
color = "$material_surface_inset"

[stylesheets.rules.set.slot]

[[stylesheets.rules]]
selector = "Button.dialog-button-primary"

[stylesheets.rules.set.self.background]
color = "$material_accent"

[stylesheets.rules.set.slot]
