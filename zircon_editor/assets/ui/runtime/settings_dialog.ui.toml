[asset]
kind = "layout"
id = "runtime.settings_dialog"
version = 1
display_name = "Settings Dialog"

[root]
node = "settings_dialog_root"

[nodes.settings_dialog_root]
kind = "native"
type = "Overlay"
control_id = "SettingsDialogRoot"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "Overlay" } }
children = [
  { child = "backdrop" },
  { child = "dialog_panel", slot = { anchor = { min = [0.5, 0.5], max = [0.5, 0.5] }, pivot = [0.5, 0.5], position = [0.0, 0.0] } },
]

[nodes.backdrop]
kind = "native"
type = "Canvas"
control_id = "SettingsBackdrop"
props = { tint = "#99000000" }
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }

[nodes.dialog_panel]
kind = "native"
type = "VerticalBox"
control_id = "SettingsDialogPanel"
classes = ["dialog-panel"]
layout = { width = { min = 420.0, preferred = 480.0, max = 560.0, stretch = "Fixed" }, height = { min = 280.0, preferred = 320.0, stretch = "Fixed" }, container = { kind = "VerticalBox", gap = 12.0 } }
children = [
  { child = "title" },
  { child = "graphics_row" },
  { child = "audio_row" },
  { child = "actions_row" },
]

[nodes.title]
kind = "native"
type = "Label"
control_id = "SettingsTitle"
props = { text = "Settings" }

[nodes.graphics_row]
kind = "native"
type = "HorizontalBox"
control_id = "GraphicsRow"
layout = { width = { stretch = "Stretch" }, container = { kind = "HorizontalBox", gap = 8.0 } }
children = [
  { child = "graphics_label", slot = { layout = { width = { min = 120.0, preferred = 160.0, stretch = "Fixed" } } } },
  { child = "graphics_value" },
]

[nodes.graphics_label]
kind = "native"
type = "Label"
control_id = "GraphicsLabel"
props = { text = "Graphics Quality" }

[nodes.graphics_value]
kind = "native"
type = "Label"
control_id = "GraphicsValue"
props = { text = "High" }

[nodes.audio_row]
kind = "native"
type = "HorizontalBox"
control_id = "AudioRow"
layout = { width = { stretch = "Stretch" }, container = { kind = "HorizontalBox", gap = 8.0 } }
children = [
  { child = "audio_label", slot = { layout = { width = { min = 120.0, preferred = 160.0, stretch = "Fixed" } } } },
  { child = "audio_value" },
]

[nodes.audio_label]
kind = "native"
type = "Label"
control_id = "AudioLabel"
props = { text = "Master Volume" }

[nodes.audio_value]
kind = "native"
type = "Label"
control_id = "AudioValue"
props = { text = "80%" }

[nodes.actions_row]
kind = "native"
type = "HorizontalBox"
control_id = "SettingsActionsRow"
layout = { width = { stretch = "Stretch" }, container = { kind = "HorizontalBox", gap = 10.0 } }
children = [
  { child = "apply_button" },
  { child = "close_button" },
]

[nodes.apply_button]
kind = "native"
type = "Button"
control_id = "ApplySettings"
props = { text = "Apply" }

[nodes.close_button]
kind = "native"
type = "Button"
control_id = "CloseSettings"
props = { text = "Close" }
