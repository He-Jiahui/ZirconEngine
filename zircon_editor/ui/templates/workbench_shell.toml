version = 1

[root]
template = "WorkbenchShell"
slots = { menu_bar = [{ template = "MenuBar" }], activity_rail = [{ template = "ActivityRail" }], document_host = [{ template = "DocumentHost" }], status_bar = [{ template = "StatusBar" }] }

[components.WorkbenchShell]
slots = { menu_bar = { required = true }, activity_rail = { required = true }, document_host = { required = true }, status_bar = { required = true } }
root = { component = "WorkbenchShell", control_id = "WorkbenchShellRoot", bindings = [{ id = "WorkbenchShell/ActivateMainPage", event = "Change", route = "DockCommand.ActivateMainPage" }], attributes = { layout = { container = { kind = "Overlay" }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, clip = true } }, children = [
    { component = "VerticalBox", control_id = "WorkbenchScaffold", attributes = { layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, clip = true } }, children = [
        { slot = "menu_bar" },
        { component = "HorizontalBox", control_id = "WorkbenchBody", attributes = { layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } } }, children = [{ slot = "activity_rail" }, { slot = "document_host" }] },
        { slot = "status_bar" }
    ] },
    { component = "Container", control_id = "HostPageStripRoot", attributes = { layout = { width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, clip = true } } },
    { component = "Overlay", control_id = "LeftDrawerShellRoot", attributes = { layout = { container = { kind = "Overlay" }, width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, clip = true } }, children = [
        { component = "Container", control_id = "LeftDrawerHeaderRoot", attributes = { layout = { width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { min = 25.0, preferred = 25.0, max = 25.0, stretch = "Fixed" }, clip = true } } },
        { component = "Container", control_id = "LeftDrawerContentRoot", attributes = { layout = { width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, clip = true } } }
    ] },
    { component = "Overlay", control_id = "RightDrawerShellRoot", attributes = { layout = { container = { kind = "Overlay" }, width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, clip = true } }, children = [
        { component = "Container", control_id = "RightDrawerHeaderRoot", attributes = { layout = { width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { min = 25.0, preferred = 25.0, max = 25.0, stretch = "Fixed" }, clip = true } } },
        { component = "Container", control_id = "RightDrawerContentRoot", attributes = { layout = { width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, clip = true } } }
    ] },
    { component = "Overlay", control_id = "BottomDrawerShellRoot", attributes = { layout = { container = { kind = "Overlay" }, width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, clip = true } }, children = [
        { component = "Container", control_id = "BottomDrawerHeaderRoot", attributes = { layout = { width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { min = 25.0, preferred = 25.0, max = 25.0, stretch = "Fixed" }, clip = true } } },
        { component = "Container", control_id = "BottomDrawerContentRoot", attributes = { layout = { width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, clip = true } } }
    ] }
] }

[components.MenuBar]
root = { component = "UiHostToolbar", control_id = "WorkbenchMenuBarRoot", attributes = { layout = { container = { kind = "HorizontalBox", gap = 8.0 }, width = { stretch = "Stretch" }, height = { min = 40.0, preferred = 40.0, max = 40.0, stretch = "Fixed" } } }, children = [
    { component = "UiHostIconButton", control_id = "OpenProject", bindings = [{ id = "WorkbenchMenuBar/OpenProject", event = "Click", route = "MenuAction.OpenProject" }], attributes = { icon = "folder-open-outline", label = "Open", layout = { width = { min = 120.0, preferred = 120.0, max = 120.0, stretch = "Fixed" }, height = { min = 32.0, preferred = 32.0, max = 32.0, stretch = "Fixed" } } } },
    { component = "UiHostIconButton", control_id = "SaveProject", bindings = [{ id = "WorkbenchMenuBar/SaveProject", event = "Click", route = "MenuAction.SaveProject" }], attributes = { icon = "save-outline", label = "Save", layout = { width = { min = 120.0, preferred = 120.0, max = 120.0, stretch = "Fixed" }, height = { min = 32.0, preferred = 32.0, max = 32.0, stretch = "Fixed" } } } },
    { component = "UiHostIconButton", control_id = "ResetLayout", bindings = [{ id = "WorkbenchMenuBar/ResetLayout", event = "Click", route = "MenuAction.ResetLayout" }], attributes = { icon = "grid-outline", label = "Reset Layout", layout = { width = { min = 120.0, preferred = 120.0, max = 120.0, stretch = "Fixed" }, height = { min = 32.0, preferred = 32.0, max = 32.0, stretch = "Fixed" } } } }
] }

[components.ActivityRail]
root = { component = "ActivityRail", control_id = "ActivityRailRoot", attributes = { layout = { container = { kind = "VerticalBox", gap = 8.0 }, width = { min = 56.0, preferred = 56.0, max = 56.0, stretch = "Fixed" }, height = { stretch = "Stretch" }, clip = true } }, children = [
    { component = "UiHostIconButton", control_id = "ProjectToggle", bindings = [{ id = "ActivityRail/ProjectToggle", event = "Click", route = "DockCommand.ActivateDrawerTab" }], attributes = { icon = "albums-outline", label = "Project", layout = { width = { min = 40.0, preferred = 40.0, max = 40.0, stretch = "Fixed" }, height = { min = 40.0, preferred = 40.0, max = 40.0, stretch = "Fixed" }, anchor = { x = 0.5, y = 0.0 }, pivot = { x = 0.5, y = 0.0 } } } },
    { component = "UiHostIconButton", control_id = "HierarchyToggle", bindings = [{ id = "ActivityRail/HierarchyToggle", event = "Click", route = "DockCommand.ActivateDrawerTab" }], attributes = { icon = "layers-outline", label = "Hierarchy", layout = { width = { min = 40.0, preferred = 40.0, max = 40.0, stretch = "Fixed" }, height = { min = 40.0, preferred = 40.0, max = 40.0, stretch = "Fixed" }, anchor = { x = 0.5, y = 0.0 }, pivot = { x = 0.5, y = 0.0 } } } },
    { component = "UiHostIconButton", control_id = "ConsoleToggle", bindings = [{ id = "ActivityRail/ConsoleToggle", event = "Click", route = "DockCommand.ActivateDrawerTab" }], attributes = { icon = "terminal-outline", label = "Console", layout = { width = { min = 40.0, preferred = 40.0, max = 40.0, stretch = "Fixed" }, height = { min = 40.0, preferred = 40.0, max = 40.0, stretch = "Fixed" }, anchor = { x = 0.5, y = 0.0 }, pivot = { x = 0.5, y = 0.0 } } } }
] }

[components.DocumentHost]
root = { component = "DocumentHost", control_id = "DocumentHostRoot", attributes = { layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, clip = true } }, children = [
    { component = "DocumentTabs", control_id = "DocumentTabsRoot", bindings = [{ id = "DocumentTabs/ActivateTab", event = "Change", route = "DockCommand.FocusView" }, { id = "DocumentTabs/CloseTab", event = "Submit", route = "DockCommand.CloseView" }], attributes = { layout = { width = { stretch = "Stretch" }, height = { min = 32.0, preferred = 32.0, max = 32.0, stretch = "Fixed" } } } },
    { component = "PaneSurface", control_id = "PaneSurfaceRoot", attributes = { layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } } } }
] }

[components.StatusBar]
root = { component = "StatusBar", control_id = "StatusBarRoot", attributes = { layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { min = 24.0, preferred = 24.0, max = 24.0, stretch = "Fixed" } } }, children = [
    { component = "UiHostLabel", control_id = "StatusText", attributes = { text = "Ready", layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } } } }
] }
