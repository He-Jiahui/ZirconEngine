            { component = "VerticalBox", control_id = "RightDrawerContentColumnRoot", attributes = { layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, clip = true } }, children = [
