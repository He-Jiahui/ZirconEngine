version = 1

[root]
template = "WorkbenchDrawerSource"

[components.WorkbenchDrawerSource]
root = { component = "WorkbenchDrawerSource", control_id = "WorkbenchDrawerSourceRoot", attributes = { layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } } }, children = [
    { component = "Container", control_id = "WorkbenchDrawerTopBarRoot", attributes = { layout = { width = { stretch = "Stretch" }, height = { min = 40.0, preferred = 40.0, max = 40.0, stretch = "Fixed" } } } },
    { component = "VerticalBox", control_id = "WorkbenchDrawerBodyColumnRoot", attributes = { layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } } }, children = [
        { component = "HorizontalBox", control_id = "WorkbenchDrawerCenterRowRoot", attributes = { layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } } }, children = [
            { template = "LeftDrawerShell" },
            { component = "Container", control_id = "WorkbenchDrawerDocumentRoot", attributes = { layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } } } },
            { template = "RightDrawerShell" }
        ] },
        { component = "Container", control_id = "BottomDrawerOuterSeparatorRoot", attributes = { layout = { width = { stretch = "Stretch" }, height = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" } } } },
        { template = "BottomDrawerShell" }
    ] },
    { component = "Container", control_id = "WorkbenchDrawerStatusBarRoot", attributes = { layout = { width = { stretch = "Stretch" }, height = { min = 24.0, preferred = 24.0, max = 24.0, stretch = "Fixed" } } } }
] }

[components.LeftDrawerShell]
root = { component = "HorizontalBox", control_id = "LeftDrawerShellRoot", attributes = { layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { stretch = "Stretch" }, clip = true } }, children = [
    { component = "Container", control_id = "LeftDrawerRailRoot", attributes = { layout = { width = { min = 34.0, preferred = 34.0, max = 34.0, stretch = "Fixed" }, height = { stretch = "Stretch" } } } },
    { component = "HorizontalBox", control_id = "LeftDrawerPanelRoot", attributes = { layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { stretch = "Stretch" }, clip = true } }, children = [
        { component = "Container", control_id = "LeftDrawerSeparatorRoot", attributes = { layout = { width = { min = 1.0, preferred = 1.0, max = 1.0, stretch = "Fixed" }, height = { stretch = "Stretch" } } } },
        { component = "VerticalBox", control_id = "LeftDrawerPanelColumnRoot", attributes = { layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, clip = true } }, children = [
            { component = "Container", control_id = "LeftDrawerHeaderRoot", attributes = { layout = { width = { stretch = "Stretch" }, height = { min = 25.0, preferred = 25.0, max = 25.0, stretch = "Fixed" }, clip = true } } },
            { component = "VerticalBox", control_id = "LeftDrawerContentColumnRoot", attributes = { layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, clip = true } }, children = [
                { component = "Container", control_id = "LeftDrawerContentSeparatorRoot", attributes = { layout = { width = { stretch = "Stretch" }, height = { min = 1.0, preferred = 1.0, max = 1.0, stretch = "Fixed" } } } },
                { component = "Container", control_id = "LeftDrawerContentRoot", attributes = { layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, clip = true } } }
            ] }
        ] }
    ] }
] }

[components.RightDrawerShell]
root = { component = "HorizontalBox", control_id = "RightDrawerShellRoot", attributes = { layout = { container = { kind = "HorizontalBox", gap = 0.0 }, width = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, height = { stretch = "Stretch" }, clip = true } }, children = [
