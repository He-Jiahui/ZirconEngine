            ] }
        ] },
        { component = "Container", control_id = "RightDrawerSeparatorRoot", attributes = { layout = { width = { min = 1.0, preferred = 1.0, max = 1.0, stretch = "Fixed" }, height = { stretch = "Stretch" } } } }
    ] },
    { component = "Container", control_id = "RightDrawerRailRoot", attributes = { layout = { width = { min = 34.0, preferred = 34.0, max = 34.0, stretch = "Fixed" }, height = { stretch = "Stretch" } } } }
] }

[components.BottomDrawerShell]
root = { component = "VerticalBox", control_id = "BottomDrawerShellRoot", attributes = { layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, clip = true } }, children = [
    { component = "Container", control_id = "BottomDrawerHeaderRoot", attributes = { layout = { width = { stretch = "Stretch" }, height = { min = 25.0, preferred = 25.0, max = 25.0, stretch = "Fixed" }, clip = true } } },
    { component = "VerticalBox", control_id = "BottomDrawerPanelRoot", attributes = { layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { min = 0.0, preferred = 0.0, max = 0.0, stretch = "Fixed" }, clip = true } }, children = [
