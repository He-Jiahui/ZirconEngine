        { component = "VerticalBox", control_id = "RightDrawerPanelColumnRoot", attributes = { layout = { container = { kind = "VerticalBox", gap = 0.0 }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, clip = true } }, children = [
