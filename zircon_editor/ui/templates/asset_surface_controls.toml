version = 1

[root]
template = "AssetSurfaceControls"

[components.AssetSurfaceControls]
root = { component = "AssetSurfaceControls", children = [
    { component = "UiHostIconButton", control_id = "SelectFolder", bindings = [{ id = "AssetSurface/SelectFolder", event = "Change", route = "AssetCommand.SelectFolder" }], attributes = { label = "SelectFolder" } },
    { component = "UiHostIconButton", control_id = "SelectItem", bindings = [{ id = "AssetSurface/SelectItem", event = "Change", route = "AssetCommand.SelectItem" }], attributes = { label = "SelectItem" } },
    { component = "UiHostIconButton", control_id = "SearchEdited", bindings = [{ id = "AssetSurface/SearchEdited", event = "Change", route = "AssetCommand.SetSearchQuery" }], attributes = { label = "SearchEdited" } },
    { component = "UiHostIconButton", control_id = "SetKindFilter", bindings = [{ id = "AssetSurface/SetKindFilter", event = "Change", route = "AssetCommand.SetKindFilter" }], attributes = { label = "SetKindFilter" } },
    { component = "UiHostIconButton", control_id = "SetViewMode", bindings = [{ id = "AssetSurface/SetViewMode", event = "Change", route = "AssetCommand.SetViewMode" }], attributes = { label = "SetViewMode" } },
    { component = "UiHostIconButton", control_id = "SetUtilityTab", bindings = [{ id = "AssetSurface/SetUtilityTab", event = "Change", route = "AssetCommand.SetUtilityTab" }], attributes = { label = "SetUtilityTab" } },
    { component = "UiHostIconButton", control_id = "ActivateReference", bindings = [{ id = "AssetSurface/ActivateReference", event = "Click", route = "AssetCommand.ActivateReference" }], attributes = { label = "ActivateReference" } },
    { component = "UiHostIconButton", control_id = "OpenAssetBrowser", bindings = [{ id = "AssetSurface/OpenAssetBrowser", event = "Click", route = "AssetCommand.OpenAssetBrowser" }], attributes = { label = "OpenAssetBrowser" } },
    { component = "UiHostIconButton", control_id = "LocateSelectedAsset", bindings = [{ id = "AssetSurface/LocateSelectedAsset", event = "Click", route = "AssetCommand.LocateSelectedAsset" }], attributes = { label = "LocateSelectedAsset" } },
    { component = "UiHostIconButton", control_id = "ImportModel", bindings = [{ id = "AssetSurface/ImportModel", event = "Click", route = "AssetCommand.ImportModel" }], attributes = { label = "ImportModel" } }
] }
