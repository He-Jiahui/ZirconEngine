version = 1

[root]
template = "WelcomeSurfaceControls"

[components.WelcomeSurfaceControls]
root = { component = "WelcomeSurfaceControls", children = [
    { component = "UiHostIconButton", control_id = "ProjectNameEdited", bindings = [{ id = "WelcomeSurface/ProjectNameEdited", event = "Change", route = "WelcomeCommand.SetProjectName" }], attributes = { label = "ProjectNameEdited" } },
    { component = "UiHostIconButton", control_id = "LocationEdited", bindings = [{ id = "WelcomeSurface/LocationEdited", event = "Change", route = "WelcomeCommand.SetLocation" }], attributes = { label = "LocationEdited" } },
    { component = "UiHostIconButton", control_id = "CreateProject", bindings = [{ id = "WelcomeSurface/CreateProject", event = "Click", route = "WelcomeCommand.CreateProject" }], attributes = { label = "CreateProject" } },
    { component = "UiHostIconButton", control_id = "OpenExistingProject", bindings = [{ id = "WelcomeSurface/OpenExistingProject", event = "Click", route = "WelcomeCommand.OpenExistingProject" }], attributes = { label = "OpenExistingProject" } },
    { component = "UiHostIconButton", control_id = "OpenRecentProject", bindings = [{ id = "WelcomeSurface/OpenRecentProject", event = "Click", route = "WelcomeCommand.OpenRecentProject" }], attributes = { label = "OpenRecentProject" } },
    { component = "UiHostIconButton", control_id = "RemoveRecentProject", bindings = [{ id = "WelcomeSurface/RemoveRecentProject", event = "Click", route = "WelcomeCommand.RemoveRecentProject" }], attributes = { label = "RemoveRecentProject" } }
] }
