[asset]
kind = "layout"
id = "runtime.ui.hud_overlay"
version = 1
display_name = "Runtime HUD Overlay"

[root]
node = "hud_root"

[nodes.hud_root]
kind = "native"
type = "Overlay"
control_id = "HudRoot"
layout = { container = { kind = "Overlay" }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [
  { child = "health_panel" },
  { child = "quest_label" },
  { child = "weapon_icon" },
  { child = "ammo_panel" },
]

[nodes.health_panel]
kind = "native"
type = "Container"
control_id = "HealthPanel"
layout = { width = { min = 240.0, preferred = 240.0, max = 240.0, stretch = "Fixed" }, height = { min = 72.0, preferred = 72.0, max = 72.0, stretch = "Fixed" }, anchor = { x = 0.0, y = 0.0 }, pivot = { x = 0.0, y = 0.0 }, position = { x = 24.0, y = 24.0 } }
props = { background = { color = "#8e2f2f" }, border = { color = "#f4c37d", width = 2.0, radius = 12.0 }, text = "HP 87 / 100", foreground = { color = "#fff4de" } }

[nodes.quest_label]
kind = "native"
type = "Label"
control_id = "QuestLabel"
layout = { width = { min = 260.0, preferred = 260.0, max = 260.0, stretch = "Fixed" }, height = { min = 28.0, preferred = 28.0, max = 28.0, stretch = "Fixed" }, anchor = { x = 1.0, y = 0.0 }, pivot = { x = 1.0, y = 0.0 }, position = { x = -28.0, y = 28.0 } }
props = { text = "Reach the relay before sunrise", foreground = { color = "#f7f1d0" }, opacity = 0.95 }

[nodes.weapon_icon]
kind = "native"
type = "Icon"
control_id = "WeaponIcon"
layout = { width = { min = 56.0, preferred = 56.0, max = 56.0, stretch = "Fixed" }, height = { min = 56.0, preferred = 56.0, max = 56.0, stretch = "Fixed" }, anchor = { x = 1.0, y = 1.0 }, pivot = { x = 1.0, y = 1.0 }, position = { x = -28.0, y = -28.0 } }
props = { icon = "pulse-rifle", foreground = { color = "#d8eefc" } }

[nodes.ammo_panel]
kind = "native"
type = "Container"
control_id = "AmmoPanel"
layout = { width = { min = 180.0, preferred = 180.0, max = 180.0, stretch = "Fixed" }, height = { min = 52.0, preferred = 52.0, max = 52.0, stretch = "Fixed" }, anchor = { x = 1.0, y = 1.0 }, pivot = { x = 1.0, y = 1.0 }, position = { x = -96.0, y = -30.0 } }
props = { background = { color = "#20384b" }, border = { color = "#6dc5ff", width = 1.0, radius = 10.0 }, text = "24 / 120", foreground = { color = "#e6f5ff" } }
