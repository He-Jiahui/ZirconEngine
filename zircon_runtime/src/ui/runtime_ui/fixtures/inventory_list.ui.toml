layout = { container = { kind = "ScrollableBox", axis = "Vertical", gap = 8.0, scrollbar_visibility = "Always", virtualization = { item_extent = 36.0, overscan = 2 } }, width = { min = 476.0, preferred = 476.0, max = 476.0, stretch = "Fixed" }, height = { min = 260.0, preferred = 260.0, max = 260.0, stretch = "Fixed" }, anchor = { x = 1.0, y = 0.5 }, pivot = { x = 1.0, y = 0.5 }, position = { x = -68.0, y = 22.0 }, clip = true }
children = [
  { child = "row_00" },
  { child = "row_01" },
  { child = "row_02" },
  { child = "row_03" },
  { child = "row_04" },
  { child = "row_05" },
  { child = "row_06" },
  { child = "row_07" },
  { child = "row_08" },
  { child = "row_09" },
