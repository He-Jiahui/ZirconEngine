[asset]
kind = "layout"
id = "runtime.ui.pause_menu"
version = 1
display_name = "Runtime Pause Menu"

[root]
node = "pause_root"

[nodes.pause_root]
kind = "native"
type = "Overlay"
control_id = "PauseMenuRoot"
layout = { container = { kind = "Overlay" }, width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
children = [
  { child = "scrim" },
  { child = "dialog" },
  { child = "title" },
  { child = "resume_button" },
  { child = "settings_button" },
  { child = "quit_button" },
  { child = "hint_label" },
]

[nodes.scrim]
kind = "native"
type = "Container"
control_id = "PauseScrim"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" } }
props = { background = { color = "#10141dcc" } }

[nodes.dialog]
kind = "native"
type = "Container"
control_id = "PauseDialog"
layout = { width = { min = 420.0, preferred = 420.0, max = 420.0, stretch = "Fixed" }, height = { min = 320.0, preferred = 320.0, max = 320.0, stretch = "Fixed" }, anchor = { x = 0.5, y = 0.5 }, pivot = { x = 0.5, y = 0.5 }, position = { x = 0.0, y = 0.0 } }
props = { background = { color = "#b13d3d" }, border = { color = "#f6d2a6", width = 3.0, radius = 18.0 }, opacity = 0.96 }

[nodes.title]
kind = "native"
type = "Label"
control_id = "PauseTitle"
layout = { width = { min = 220.0, preferred = 220.0, max = 220.0, stretch = "Fixed" }, height = { min = 36.0, preferred = 36.0, max = 36.0, stretch = "Fixed" }, anchor = { x = 0.5, y = 0.5 }, pivot = { x = 0.5, y = 0.0 }, position = { x = 0.0, y = -114.0 } }
props = { text = "Paused", foreground = { color = "#fff4e0" } }

[nodes.resume_button]
kind = "native"
type = "Button"
control_id = "ResumeButton"
layout = { width = { min = 280.0, preferred = 280.0, max = 280.0, stretch = "Fixed" }, height = { min = 52.0, preferred = 52.0, max = 52.0, stretch = "Fixed" }, anchor = { x = 0.5, y = 0.5 }, pivot = { x = 0.5, y = 0.0 }, position = { x = 0.0, y = -32.0 } }
props = { background = { color = "#272c38" }, border = { color = "#f7d58d", width = 1.0, radius = 10.0 }, text = "Resume Mission", foreground = { color = "#fff7ea" } }

[nodes.settings_button]
kind = "native"
type = "Button"
control_id = "SettingsButton"
layout = { width = { min = 280.0, preferred = 280.0, max = 280.0, stretch = "Fixed" }, height = { min = 52.0, preferred = 52.0, max = 52.0, stretch = "Fixed" }, anchor = { x = 0.5, y = 0.5 }, pivot = { x = 0.5, y = 0.0 }, position = { x = 0.0, y = 36.0 } }
props = { background = { color = "#272c38" }, border = { color = "#9ab3ce", width = 1.0, radius = 10.0 }, text = "Settings", foreground = { color = "#eef3f7" } }

[nodes.quit_button]
kind = "native"
type = "Button"
control_id = "QuitButton"
layout = { width = { min = 280.0, preferred = 280.0, max = 280.0, stretch = "Fixed" }, height = { min = 52.0, preferred = 52.0, max = 52.0, stretch = "Fixed" }, anchor = { x = 0.5, y = 0.5 }, pivot = { x = 0.5, y = 0.0 }, position = { x = 0.0, y = 104.0 } }
props = { background = { color = "#341f24" }, border = { color = "#ff9787", width = 1.0, radius = 10.0 }, text = "Return To Title", foreground = { color = "#fff0ec" } }

[nodes.hint_label]
kind = "native"
type = "Label"
control_id = "PauseHint"
layout = { width = { min = 240.0, preferred = 240.0, max = 240.0, stretch = "Fixed" }, height = { min = 24.0, preferred = 24.0, max = 24.0, stretch = "Fixed" }, anchor = { x = 0.5, y = 0.5 }, pivot = { x = 0.5, y = 0.0 }, position = { x = 0.0, y = 188.0 } }
props = { text = "Press Esc to close", foreground = { color = "#f7dfc3" }, opacity = 0.85 }
