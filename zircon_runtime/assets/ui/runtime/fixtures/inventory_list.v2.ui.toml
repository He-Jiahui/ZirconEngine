[asset]
kind = "view"
id = "runtime.ui.inventory_list"
version = 2
display_name = "Runtime Inventory List"

[imports]
widgets = []
styles = []

[root]
node = "inventory_root"

[nodes.inventory_root]
component = "Overlay"
control_id = "InventoryRoot"
layout = { width = { stretch = "Stretch" }, height = { stretch = "Stretch" }, container = { kind = "Overlay" } }
children = [{ node = "inventory_panel" }, { node = "inventory_header" }, { node = "inventory_list" }]

[nodes.inventory_panel]
component = "Container"
control_id = "InventoryPanel"
props = { background = { color = "#1d2330" }, border = { color = "#7aa3d0", width = 2.0, radius = 16.0 } }
layout = { width = { min = 540.0, preferred = 540.0, max = 540.0, stretch = "Fixed" }, height = { min = 380.0, preferred = 380.0, max = 380.0, stretch = "Fixed" }, anchor = { x = 1.0, y = 0.5 }, pivot = { x = 1.0, y = 0.5 }, position = { x = -36.0, y = 0.0 } }

[nodes.inventory_header]
component = "Container"
control_id = "InventoryHeader"
props = { text = "Field Inventory", background = { color = "#7a4e23" }, border = { color = "#f2d1a0", width = 1.0, radius = 12.0 }, foreground = { color = "#fff2de" } }
layout = { width = { min = 476.0, preferred = 476.0, max = 476.0, stretch = "Fixed" }, height = { min = 56.0, preferred = 56.0, max = 56.0, stretch = "Fixed" }, anchor = { x = 1.0, y = 0.5 }, pivot = { x = 1.0, y = 0.5 }, position = { x = -68.0, y = -140.0 } }

[nodes.inventory_list]
component = "ScrollableBox"
control_id = "InventoryList"
layout = { clip = true, width = { min = 476.0, preferred = 476.0, max = 476.0, stretch = "Fixed" }, height = { min = 260.0, preferred = 260.0, max = 260.0, stretch = "Fixed" }, anchor = { x = 1.0, y = 0.5 }, pivot = { x = 1.0, y = 0.5 }, position = { x = -68.0, y = 22.0 }, container = { kind = "ScrollableBox", axis = "Vertical", gap = 8.0, scrollbar_visibility = "Always", virtualization = { item_extent = 36.0, overscan = 2 } } }
children = [
  { node = "row_00" },
  { node = "row_01" },
  { node = "row_02" },
  { node = "row_03" },
  { node = "row_04" },
  { node = "row_05" },
  { node = "row_06" },
  { node = "row_07" },
  { node = "row_08" },
  { node = "row_09" },
